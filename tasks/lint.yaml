includes:
  - remote: https://raw.githubusercontent.com/defenseunicorns/uds-common/v1.27.0/tasks/lint.yaml

tasks:
  - name: ensure-uv
    description: Install linting tool dependencies
    actions:
      - description: Check if uv is installed
        cmd: |
          if ! command -v uv; then
            echo "⚠️  uv is not installed."
            echo "💡 Refer to installation steps: https://docs.astral.sh/uv/getting-started/installation/"
            exit 1
          fi

  - name: fix
    description: "Fix formatting issues in the repo"
    actions:
      - description: Ensure uv is installed
        task: ensure-uv
      - description: "Pepr Format"
        cmd: npx pepr format
      - description: Fix codespell lint issues
        cmd: |
          uvx codespell || true
          uvx codespell -w

  - name: check
    description: "Run linting checks"
    actions:
      - description: Ensure uv is installed
        task: ensure-uv
      - description: install pepr deps
        task: install-pepr-deps
      - description: Build the Pepr module for values lint
        task: build-pepr
      - description: Lint packages that expose Zarf values
        task: values-lint
      - description: "Pepr Format check"
        cmd: npx pepr format --validate-only
      - description: yaml lint
        cmd: uvx yamllint . -c .yamllint --no-warnings
      - description: codespell lint
        cmd: uvx codespell
      - description: Install addlicense dep
        # renovate: datasource=github-tags depName=google/addlicense versioning=semver
        cmd: GOPATH="$HOME/go" go install github.com/google/addlicense@v1.1.1
      - description: license lint
        task: license
      - description: Run helm unittest on all charts
        task: helm-unittest
  - name: values-lint
    description: "Lint each package that exposes Zarf values to catch mapping/schema regressions"
    inputs:
      package:
        description: "Optional values-bearing package to lint"
        default: ""
    actions:
      - description: "Lint each values-bearing package"
        shell:
          darwin: bash
          linux: bash
        cmd: |
          set -euo pipefail
          package="${{ .inputs.package }}"
          if [ -n "$package" ] && [ ! -f "packages/${package}/zarf-values.yaml" ]; then
            echo "ERROR: packages/${package}/zarf-values.yaml does not exist"
            exit 1
          fi
          # A package exposes native values when it provides this default values file.
          for values_file in packages/*/zarf-values.yaml; do
            pkg="${values_file#packages/}"
            pkg="${pkg%/zarf-values.yaml}"
            if [ -n "$package" ] && [ "$pkg" != "$package" ]; then
              continue
            fi
            echo "Linting packages/${pkg}"
            if ! uds zarf dev lint "packages/${pkg}" --flavor upstream; then
              echo "ERROR: values lint failed for packages/${pkg}"
              exit 1
            fi
          done
      - description: "Validate default values files against their schemas"
        shell:
          darwin: bash
          linux: bash
        cmd: |
          set -euo pipefail
          package="${{ .inputs.package }}"
          if [ -n "$package" ] && [ ! -f "packages/${package}/zarf-values.yaml" ]; then
            echo "ERROR: packages/${package}/zarf-values.yaml does not exist"
            exit 1
          fi
          for values_file in packages/*/zarf-values.yaml; do
            pkg="${values_file#packages/}"
            pkg="${pkg%/zarf-values.yaml}"
            if [ -n "$package" ] && [ "$pkg" != "$package" ]; then
              continue
            fi
            echo "Validating packages/${pkg}/zarf-values.yaml"
            if ! uvx check-jsonschema \
              --schemafile "packages/${pkg}/zarf-values.schema.json" \
              "packages/${pkg}/zarf-values.yaml"; then
              echo "ERROR: values schema validation failed for packages/${pkg}"
              exit 1
            fi
          done


  - name: install-pepr-deps
    description: "Install Pepr dependencies"
    actions:
      - cmd: npm ci

  - name: build-pepr
    description: "Build the Pepr module required by values checks"
    inputs:
      package:
        description: "Optional values-bearing package being checked"
        default: ""
    actions:
      - description: Build the Pepr module when required
        cmd: |
          package="${{ .inputs.package }}"
          if [ -z "$package" ] || [ "$package" = "base" ] || [ "$package" = "standard" ]; then
            npx pepr build -z chart
          else
            echo "Skipping Pepr build for packages/${package}"
          fi

  - name: values-generate
    description: "Regenerate each values-bearing package's zarf-values.schema.json from its package definition"
    inputs:
      package:
        description: "Optional values-bearing package to regenerate"
        default: ""
    actions:
      - task: install-pepr-deps
      - task: build-pepr
        with:
          package: "${{ .inputs.package }}"
      - description: "Regenerate each package's values schema"
        shell:
          darwin: bash
          linux: bash
        cmd: |
          set -euo pipefail
          package="${{ .inputs.package }}"
          if [ -n "$package" ] && [ ! -f "packages/${package}/zarf-values.yaml" ]; then
            echo "ERROR: packages/${package}/zarf-values.yaml does not exist"
            exit 1
          fi
          for values_file in packages/*/zarf-values.yaml; do
            pkg="${values_file#packages/}"
            pkg="${pkg%/zarf-values.yaml}"
            if [ -n "$package" ] && [ "$pkg" != "$package" ]; then
              continue
            fi
            echo "Generating packages/${pkg}/zarf-values.schema.json"
            # Write to a temp file and move on success so a failed/flaky generate never truncates a committed schema.
            tmp=$(mktemp)
            if ! uds zarf dev generate-schema "packages/${pkg}" --flavor upstream --delete-not-found > "$tmp"; then
              rm -f "$tmp"
              echo "ERROR: values schema generation failed for packages/${pkg}"
              exit 1
            fi
            mv "$tmp" "packages/${pkg}/zarf-values.schema.json"
          done

  - name: helm-unittest
    description: "Run helm unittest on all charts"
    actions:
      - description: Run helm unittest on all charts
        cmd: |
          failed=0
          for chart in $(find . -name Chart.yaml -type f -exec dirname {} \;); do
            if [ -d "$chart/tests" ]; then
              echo "Testing $chart"
              if ! helm unittest "$chart" --color; then
                failed=1
              fi
            else
              echo "No helm unittests configured for $chart"
            fi
          done
          exit $failed

  - name: license
    actions:
      - description: Lint for the SPDX license identifier being in source files
        task: remote:license

  - name: fix-license
    actions:
      - description: Add the SPDX license identifier to source files
        task: remote:fix-license

  - name: k8s-version-check
    description: "Verify documented Kubernetes version matches CI test config"
    actions:
      - description: Check k8s version consistency between docs and terraform
        shell:
          darwin: bash
          linux: bash
        cmd: |
          set -euo pipefail
          DOC_FILE="docs/concepts/platform/supported-distributions.mdx"
          FAILED=0

          # Extract k8s versions from terraform config
          EKS_VERSION=$(grep -A3 'variable "kubernetes_version"' .github/test-infra/aws/eks/variables.tf | sed -n 's/.*default *= *"\([0-9]*\.[0-9]*\)".*/\1/p')
          AKS_VERSION=$(grep -A3 'variable "kubernetes_version"' .github/test-infra/azure/aks/variables.tf | sed -n 's/.*default *= *"\([0-9]*\.[0-9]*\)".*/\1/p')
          RKE2_VERSION=$(sed -n 's/.*rke2_version *= *"\([0-9]*\.[0-9]*\)".*/\1/p' .github/test-infra/aws/rke2/terraform.tfvars)

          for name in EKS AKS RKE2; do
            val=$(eval echo "\$${name}_VERSION")
            if [ -z "$val" ]; then
              echo "ERROR: Failed to extract ${name} version from terraform config"
              exit 1
            fi
            echo "${name} version: $val"
          done

          # All terraform versions must agree
          if [ "$EKS_VERSION" != "$AKS_VERSION" ] || [ "$EKS_VERSION" != "$RKE2_VERSION" ]; then
            echo "ERROR: Terraform versions disagree (EKS=$EKS_VERSION AKS=$AKS_VERSION RKE2=$RKE2_VERSION)"
            exit 1
          fi
          EXPECTED="$EKS_VERSION"
          echo "Expected version: $EXPECTED"

          # Check the [!NOTE] callout contains the version
          if ! grep -q "tests against \*\*Kubernetes ${EXPECTED}\*\*" "$DOC_FILE"; then
            echo "ERROR: [!NOTE] callout missing version (expected '**Kubernetes ${EXPECTED}**')"
            FAILED=1
          fi

          # Check that all versioned table rows use the expected version
          ALL_VERSION_ROWS=$(grep -E '^\| .* \*\*[0-9]+\.[0-9]+\*\* \|' "$DOC_FILE" || true)
          TOTAL_ROWS=$(printf '%s\n' "$ALL_VERSION_ROWS" | sed -n '/./p' | wc -l | tr -d ' ')
          EXPECTED_ROWS=$(printf '%s\n' "$ALL_VERSION_ROWS" | grep -F "| **${EXPECTED}** |" | wc -l | tr -d ' ')
          if [ "$TOTAL_ROWS" -ne "$EXPECTED_ROWS" ]; then
            echo "ERROR: One or more distribution rows use a Kubernetes version different from ${EXPECTED}"
            FAILED=1
          fi

          if [ "$FAILED" -eq 0 ]; then
            echo "OK: All versions match $EXPECTED"
          fi
          exit $FAILED
