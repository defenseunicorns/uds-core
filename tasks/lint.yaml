includes:
  - remote: https://raw.githubusercontent.com/defenseunicorns/uds-common/v1.24.1/tasks/lint.yaml

tasks:
  - name: ensure-uv
    description: Install linting tool dependencies
    actions:
      - description: Check if uv is installed
        cmd: |
          if ! command -v uv; then
            echo "⚠️  uv is not installed."
            echo "💡 Refer to installation steps: https://docs.astral.sh/uv/getting-started/installation/"
            exit 1
          fi

  - name: fix
    description: "Fix formatting issues in the repo"
    actions:
      - description: Ensure uv is installed
        task: ensure-uv
      - description: "Pepr Format"
        cmd: npx pepr format
      - description: Fix codespell lint issues
        cmd: |
          uvx codespell || true
          uvx codespell -w

  - name: check
    description: "Run linting checks"
    actions:
      - description: Ensure uv is installed
        task: ensure-uv
      - description: install pepr deps
        cmd: npm ci
      - description: "Pepr Format check"
        cmd: npx pepr format --validate-only
      - description: yaml lint
        cmd: uvx yamllint . -c .yamllint --no-warnings
      - description: codespell lint
        cmd: uvx codespell
      - description: Install addlicense dep
        # renovate: datasource=github-tags depName=google/addlicense versioning=semver
        cmd: GOPATH="$HOME/go" go install github.com/google/addlicense@v1.1.1
      - description: license lint
        task: license
      - description: Run helm unittest on all charts
        task: helm-unittest

  - name: helm-unittest
    description: "Run helm unittest on all charts"
    actions:
      - description: Run helm unittest on all charts
        cmd: |
          failed=0
          for chart in $(find . -name Chart.yaml -type f -exec dirname {} \;); do
            if [ -d "$chart/tests" ]; then
              echo "Testing $chart"
              if ! helm unittest "$chart" --color; then
                failed=1
              fi
            else
              echo "No helm unittests configured for $chart"
            fi
          done
          exit $failed

  - name: license
    actions:
      - description: Lint for the SPDX license identifier being in source files
        task: remote:license

  - name: fix-license
    actions:
      - description: Add the SPDX license identifier to source files
        task: remote:fix-license

  - name: k8s-version-check
    description: "Verify documented Kubernetes version matches CI test config"
    actions:
      - description: Check k8s version consistency between docs and terraform
        shell:
          darwin: bash
          linux: bash
        cmd: |
          DOC_FILE="docs/concepts/platform/supported-distributions.mdx"

          # Extract k8s versions from terraform config
          EKS_VERSION=$(grep -A3 'variable "kubernetes_version"' .github/test-infra/aws/eks/variables.tf | sed -n 's/.*default *= *"\([0-9]*\.[0-9]*\)".*/\1/p')
          AKS_VERSION=$(grep -A3 'variable "kubernetes_version"' .github/test-infra/azure/aks/variables.tf | sed -n 's/.*default *= *"\([0-9]*\.[0-9]*\)".*/\1/p')
          RKE2_VERSION=$(sed -n 's/.*rke2_version *= *"\([0-9]*\.[0-9]*\)".*/\1/p' .github/test-infra/aws/rke2/terraform.tfvars)

          # Extract k8s versions from the doc table (bold versions like **1.34**)
          DOC_VERSIONS=$(sed -n 's/.*\*\*[^0-9]*\([0-9][0-9]*\.[0-9][0-9]*\)\*\*.*/\1/p' "$DOC_FILE" | sort -u)
          DOC_VERSION_COUNT=$(echo "$DOC_VERSIONS" | wc -l | tr -d ' ')

          echo "EKS version:  $EKS_VERSION"
          echo "AKS version:  $AKS_VERSION"
          echo "RKE2 version: $RKE2_VERSION"
          echo "Doc versions: $DOC_VERSIONS (unique count: $DOC_VERSION_COUNT)"

          FAILED=0

          # All doc table versions should be the same
          if [ "$DOC_VERSION_COUNT" -ne 1 ]; then
            echo "ERROR: Multiple k8s versions found in docs table: $DOC_VERSIONS"
            FAILED=1
          fi

          DOC_VERSION=$(echo "$DOC_VERSIONS" | head -1)

          [ "$DOC_VERSION" != "$EKS_VERSION" ] && echo "ERROR: EKS version ($EKS_VERSION) does not match docs ($DOC_VERSION)" && FAILED=1
          [ "$DOC_VERSION" != "$AKS_VERSION" ] && echo "ERROR: AKS version ($AKS_VERSION) does not match docs ($DOC_VERSION)" && FAILED=1
          [ "$DOC_VERSION" != "$RKE2_VERSION" ] && echo "ERROR: RKE2 version ($RKE2_VERSION) does not match docs ($DOC_VERSION)" && FAILED=1
          exit $FAILED
