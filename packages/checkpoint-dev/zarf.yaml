kind: ZarfPackageConfig

metadata:
  name: k3d-core-slim-dev
  description: "Rehydratable UDS K3d + UDS Core Slim (Istio, UDS Operator and Keycloak) Checkpoint"
  authors: "Defense Unicorns - Product"
  # x-release-please-start-version
  version: "1.9.0"
  # x-release-please-end

variables:
  - name: CLUSTER_NAME
    description: "Name of the cluster"
    default: "uds"
  - name: K3D_EXTRA_ARGS
    description: "Optionally pass k3d arguments to the default"
    default: ""
  - name: NGINX_EXTRA_PORTS
    description: "Optionally allow more ports through Nginx (combine with K3D_EXTRA_ARGS '-p <port>:<port>@server:*')"
    default: "[]"

components:
  - name: destroy-cluster
    required: true
    description: "Optionally destroy the cluster before creating it"
    actions:
      onDeploy:
        before:
          - cmd: k3d cluster delete ${ZARF_VAR_CLUSTER_NAME}
            description: "Destroy the cluster"
          - cmd: |
              docker volume rm "k3d-${ZARF_VAR_CLUSTER_NAME}-k3s"     >/dev/null 2>&1 || true
              docker volume rm "k3d-${ZARF_VAR_CLUSTER_NAME}-kubelet" >/dev/null 2>&1 || true
            description: "Remove checkpoint volumes"

  - name: create-cluster
    required: true
    description: "Create the K3d cluster w/UDS Core pre-installed"
    files:
      - source: uds-checkpoint.tar
        target: uds-checkpoint.tar
      - source: busybox.tar
        target: busybox.tar
    actions:
      onCreate:
        before:
          - cmd: ./checkpoint.sh
        onSuccess:
          - cmd: rm -f uds-checkpoint.tar busybox.tar
      onDeploy:
        after:
          - cmd: |
              set -euo pipefail
              VOL_K3S="k3d-${ZARF_VAR_CLUSTER_NAME}-k3s"
              VOL_KUBELET="k3d-${ZARF_VAR_CLUSTER_NAME}-kubelet"

              # Load the checkpoint image and capture its local ref so k3d uses
              # the bundled image — not a remote pull of the same tag.
              CHECKPOINT_IMAGE=$(tar -xOf uds-checkpoint.tar uds-k3d-checkpoint-latest.tar \
                | docker load | awk '{print $NF}')
              docker load < busybox.tar >/dev/null

              # Create named Docker volumes and inject the checkpoint data by
              # piping each tarball from the bundle directly into a busybox
              # helper container that mounts the volume.
              #
              # Named volumes live inside the Docker VM, so this works on macOS
              # (Lima, OrbStack, Docker Desktop) — no host bind-mount or sudo
              # required.
              docker volume create "$VOL_K3S" >/dev/null
              docker volume create "$VOL_KUBELET" >/dev/null

              tar -xOf uds-checkpoint.tar k3s_data.tar | \
                docker run --rm -i --user root -v "${VOL_K3S}:/data" cgr.dev/chainguard/busybox tar -x -C /data -f -

              tar -xOf uds-checkpoint.tar kubelet_data.tar | \
                docker run --rm -i --user root -v "${VOL_KUBELET}:/data" cgr.dev/chainguard/busybox tar -x -C /data -f -

              # Read the cluster token from the restored volume — no host
              # filesystem access needed.
              K8S_TOKEN=$(docker run --rm \
                --user root -v "${VOL_K3S}:/data" cgr.dev/chainguard/busybox \
                cat /data/server/token)

              # Create the cluster using named volumes instead of host paths.
              # k3d's -v flag accepts volume-name:/path just like docker run.
              k3d cluster create \
                -p "80:80@server:*" \
                -p "443:443@server:*" \
                --api-port 6550 \
                --k3s-arg "--disable=traefik@server:*" \
                --k3s-arg "--disable=metrics-server@server:*" \
                --k3s-arg "--disable=servicelb@server:*" \
                --k3s-arg "--disable=local-storage@server:*" \
                --k3s-arg "--token=${K8S_TOKEN}@server:*" \
                -v "${VOL_K3S}:/var/lib/rancher/k3s@server:*" \
                -v "${VOL_KUBELET}:/var/lib/kubelet@server:*" \
                --image "$CHECKPOINT_IMAGE" \
                ${ZARF_VAR_K3D_EXTRA_ARGS} \
                ${ZARF_VAR_CLUSTER_NAME}
            shell:
              linux: bash
              darwin: bash
            description: "Create the cluster"
          # Wait on Keycloak since it is the slowest pod to start after cluster
          # creation.
          - description: Keycloak to be Healthy
            wait:
              cluster:
                kind: Pod
                name: app.kubernetes.io/name=keycloak
                namespace: keycloak
                condition: Ready
          - description: Pepr Admission to be Healthy
            wait:
              cluster:
                kind: Pod
                name: app=pepr-uds-core
                namespace: pepr-system
                condition: Ready
          - description: Pepr Watcher to be Healthy
            wait:
              cluster:
                kind: Pod
                name: app=pepr-uds-core-watcher
                namespace: pepr-system
                condition: Ready
        onSuccess:
          - cmd: rm -f uds-checkpoint.tar busybox.tar
