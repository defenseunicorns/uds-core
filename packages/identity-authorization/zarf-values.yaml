# Default Zarf values for the UDS Core Identity & Authorization package.
# Keys are namespaced by component then chart (component.chart); each maps to that chart root.
# An empty {} is a no-op — chart defaults are preserved while still allowing per-key overrides
# via --values. Every mapped chart must have its component.chart key present here (an absent
# sourcePath is a hard deploy error). See excludePaths in src/*/zarf.yaml for blocked paths.

# Top-level domain for the whole stack; defaults to the DOMAIN Zarf variable
# (backward-compat). Override via --values / --set-values to set the domain once for all charts.
domain: "###ZARF_VAR_DOMAIN###"

# Admin domain override; empty falls back to the ADMIN_DOMAIN variable, then admin.<domain>.
adminDomain: ""

keycloak:
  keycloak: {}
authservice:
  authservice: {}
