# Default Zarf values for the UDS Core Identity & Authorization package.

# Shared domains for the whole stack. Override via --values / --set-values to configure all charts.
global:
  domain: ""
  # Empty falls back to the ADMIN_DOMAIN variable, then admin.<domain>.
  adminDomain: ""

keycloak:
  keycloak: {}
authservice:
  authservice: {}
