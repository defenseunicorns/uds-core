tasks:
  - name: validate
    actions:
      - description: "Validate Package CRD exist"
        wait:
          cluster:
            kind: CustomResourceDefinition
            name: packages.uds.dev
      - description: "Validate Exemption CRD exists"
        wait:
          cluster:
            kind: CustomResourceDefinition
            name: exemptions.uds.dev
      - description: "Validate ClusterConfig CRD exists"
        wait:
          cluster:
            kind: CustomResourceDefinition
            name: clusterconfig.uds.dev
