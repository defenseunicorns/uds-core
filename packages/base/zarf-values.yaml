# Default Zarf values for the UDS Core Base package. Keys are namespaced by component then chart
# (component.chart); each maps to that chart root. An empty {} is a no-op — chart defaults are
# preserved while still allowing overrides via --values. Every mapped chart must have its
# component.chart key present here (an absent sourcePath is a hard deploy error). See excludePaths
# in src/*/zarf.yaml for blocked paths.

# Top-level domain for the whole stack; defaults to the DOMAIN Zarf variable
# (backward-compat). Override via --values / --set-values to set the domain once for all charts.
domain: "###ZARF_VAR_DOMAIN###"

# Admin domain override for admin-exposed services. Empty by default: when unset, admin services
# fall back to the ADMIN_DOMAIN variable, then derive admin.<domain>. Set this to force a specific
# admin domain across all admin services via values.
adminDomain: ""

# --- pepr ---
pepr-uds-core:
  module: {}
uds-operator-config:
  uds-operator-config: {}

# --- istio ---
istio-controlplane:
  base: {}
  istiod: {}
  uds-global-istio-config: {}
  cni: {}
  ztunnel: {}
istio-admin-gateway:
  gateway: {}
  uds-istio-config: {}
istio-tenant-gateway:
  gateway: {}
  uds-istio-config: {}
istio-passthrough-gateway:
  gateway: {}
  uds-istio-config: {}
istio-egress-ambient:
  uds-istio-egress-config: {}
istio-egress-gateway:
  gateway: {}

# --- envoy gateway ---
envoy-gateway:
  envoy-gateway: {}
  uds-envoy-gateway-config: {}

# --- prometheus stack (generate-schema surfaces these from the imported src package even
# though base ships only prometheus-operator-crds; the charts themselves deploy via monitoring) ---
kube-prometheus-stack:
  kube-prometheus-stack: {}
  uds-prometheus-config: {}
prometheus-blackbox-exporter:
  prometheus-blackbox-exporter: {}
