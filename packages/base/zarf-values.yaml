# Default Zarf values for the UDS Core Base package.

# Top-level domain for the whole stack. Override via --values / --set-values to set the domain once for all charts.
domain: ""

# Admin domain override; empty falls back to the ADMIN_DOMAIN variable, then admin.<domain>.
adminDomain: ""

# --- pepr ---
pepr-uds-core:
  module: {}
uds-operator-config:
  uds-operator-config: {}

uds-exemptions:
  uds-exemptions: {}

# --- istio ---
istio-controlplane:
  base: {}
  istiod: {}
  uds-global-istio-config: {}
  cni: {}
  ztunnel: {}
istio-admin-gateway:
  gateway: {}
  uds-istio-config: {}
istio-tenant-gateway:
  gateway: {}
  uds-istio-config: {}
istio-passthrough-gateway:
  gateway: {}
  uds-istio-config: {}
istio-egress-ambient:
  uds-istio-egress-config: {}
istio-egress-gateway:
  gateway: {}

# --- envoy gateway ---
envoy-gateway:
  envoy-gateway: {}
  uds-envoy-gateway-config: {}

# --- prometheus stack (generate-schema surfaces these from the imported src package even
# though base ships only prometheus-operator-crds; the charts themselves deploy via monitoring) ---
kube-prometheus-stack:
  kube-prometheus-stack: {}
  uds-prometheus-config: {}
prometheus-blackbox-exporter:
  prometheus-blackbox-exporter: {}
