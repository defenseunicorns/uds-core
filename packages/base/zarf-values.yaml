# Default Zarf values for the UDS Core Base package.
# Each top-level key is a pass-through namespace that maps to the corresponding chart root
# (sourcePath: .key, targetPath: .). An empty {} is a no-op — chart defaults are preserved
# while still allowing per-key overrides via --values. Set any valid chart key under the
# namespace; see excludePaths in src/*/zarf.yaml for blocked paths.
pepr: {}

istiod: {}

uds-istio-config-admin: {}

uds-istio-config-tenant: {}

tenant-gateway:
  service: {}
