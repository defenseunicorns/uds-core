# Default Zarf values for the UDS Core Monitoring package.
# Each top-level key is a pass-through namespace that maps to the corresponding chart root.
# An empty {} is a no-op — chart defaults are preserved while still allowing per-key overrides
# via --values. See excludePaths in src/grafana/common/zarf.yaml for blocked paths.
# uds-grafana-config.domain / adminDomain are excluded (remain driven by ###ZARF_VAR###).
uds-grafana-config:
  postgresql: {}

grafana: {}
