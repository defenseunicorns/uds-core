# Default Zarf values for the UDS Core Monitoring package. Keys are namespaced by component then
# chart (component.chart); each maps to that chart root. An empty {} is a no-op — chart defaults
# are preserved while still allowing overrides via --values. Every mapped chart must have its
# component.chart key present here (an absent sourcePath is a hard deploy error). See excludePaths
# in src/grafana/common/zarf.yaml and src/prometheus-stack/common/zarf.yaml for blocked paths.

# Top-level domain for the whole stack; defaults to the DOMAIN Zarf variable
# (backward-compat). Override via --values / --set-values to set the domain once for all charts.
domain: "###ZARF_VAR_DOMAIN###"

# Admin domain override; empty falls back to the ADMIN_DOMAIN variable, then admin.<domain>.
adminDomain: ""

kube-prometheus-stack:
  kube-prometheus-stack: {}
  uds-prometheus-config: {}
prometheus-blackbox-exporter:
  prometheus-blackbox-exporter: {}
grafana:
  grafana: {}
  uds-grafana-config: {}
