kind: ZarfPackageConfig
metadata:
  name: core-portal
  description: "UDS Core (Portal)"
  authors: "Defense Unicorns - Product"
  # x-release-please-start-version
  version: "1.4.0"
  # x-release-please-end
  x-uds-dependencies: ["base", "identity-authorization"]
  annotations:
    dev.uds.title: UDS Core (Portal)
    dev.uds.tagline: Provides a user-facing application portal for UDS environments
    dev.uds.categories: UDS-Core,Portal
    dev.uds.keywords: uds,portal

components:
  - name: uds-portal
    required: true
    only:
      flavor: upstream
    import:
      path: ../../src/portal

  - name: uds-portal
    required: true
    only:
      flavor: unicorn
    import:
      path: ../../src/portal
