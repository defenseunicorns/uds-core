# Default Zarf values for the UDS Core Logging package. Keys are namespaced by component then
# chart (component.chart); each maps to that chart root. An empty {} is a no-op — chart defaults
# are preserved while still allowing overrides via --values. Every mapped chart must have its
# component.chart key present here (an absent sourcePath is a hard deploy error). See excludePaths
# in src/*/zarf.yaml for blocked paths.

loki:
  loki: {}
  uds-loki-config: {}
vector:
  vector: {}
  uds-vector-config: {}
