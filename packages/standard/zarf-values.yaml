# Default Zarf values for the full UDS Core (standard) package.

# Top-level domain for the whole stack. Override via --values / --set-values to set the domain once for all charts.
domain: ""

# Admin domain override; empty falls back to the ADMIN_DOMAIN variable, then admin.<domain>.
adminDomain: ""

# --- base (pepr / istio / envoy) ---
pepr-uds-core:
  module: {}
uds-operator-config:
  uds-operator-config: {}
uds-exemptions:
  uds-exemptions: {}
istio-controlplane:
  base: {}
  istiod: {}
  uds-global-istio-config: {}
  cni: {}
  ztunnel: {}
istio-admin-gateway:
  gateway: {}
  uds-istio-config: {}
istio-tenant-gateway:
  gateway: {}
  uds-istio-config: {}
istio-passthrough-gateway:
  gateway: {}
  uds-istio-config: {}
istio-egress-ambient:
  uds-istio-egress-config: {}
istio-egress-gateway:
  gateway: {}
envoy-gateway:
  envoy-gateway: {}
  uds-envoy-gateway-config: {}

# --- prometheus operator CRDs ---
prometheus-operator-crds:
  prometheus-operator-crds: {}

# --- identity-authorization (keycloak / authservice) ---
keycloak:
  keycloak: {}
authservice:
  authservice: {}

# --- logging (loki / vector) ---
