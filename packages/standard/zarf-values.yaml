# Default Zarf values for the full UDS Core (standard) package. This is the union of the
# per-layer values files (base, identity-authorization, logging, monitoring).
# Zarf deep-merges values onto the chart defaults, so object knobs are left as empty no-ops
# ({}) to preserve chart defaults while staying overridable; scalars carry the chart default.
# See each package's zarf-values.schema.json for the full set of overridable paths.

# --- base (pepr / istio) ---
pepr:
  watcher:
    resources: {}
  admission:
    resources: {}
istiod:
  resources: {}
uds-istio-config-admin: {}
uds-istio-config-tenant: {}
tenant-gateway:
  service: {}

# --- identity-authorization (keycloak / authservice) ---
# keycloak.domain / adminDomain remain driven by ###ZARF_VAR### and are not exposed here.
keycloak:
  insecureAdminPasswordGeneration:
    enabled: false
  autoscaling:
    enabled: false
  resources: {}
  postgresql: {}
authservice:
  replicaCount: 1
  resources: {}

# --- logging (loki) ---
loki:
  loki:
    storage: {}
  write:
    replicas: 3
  read:
    replicas: 3
  backend:
    replicas: 3

# --- monitoring (grafana / uds-grafana-config) ---
# uds-grafana-config.domain / adminDomain remain driven by ###ZARF_VAR### and are not exposed.
uds-grafana-config:
  postgresql: {}
grafana:
  autoscaling:
    enabled: false
