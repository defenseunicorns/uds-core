# Default Zarf values for the full UDS Core (standard) package. This is the union of the
# per-layer values files (base, identity-authorization, logging, monitoring).
# Each top-level key is a pass-through namespace mapping to the corresponding chart root.
# An empty {} is a no-op — chart defaults are preserved while still allowing overrides via
# --values. See excludePaths in the relevant src/*/zarf.yaml for blocked paths.

# --- base (pepr / istio) ---
pepr: {}
uds-operator-config:
  cluster:
    expose: {}
istiod: {}
uds-istio-config-admin: {}
uds-istio-config-tenant: {}
tenant-gateway:
  service: {}

# --- identity-authorization (keycloak / authservice) ---
keycloak:
  insecureAdminPasswordGeneration:
    enabled: false
  autoscaling:
    enabled: false
  resources: {}
  postgresql: {}
authservice: {}

# --- logging (loki) ---
loki: {}

# --- monitoring (grafana / uds-grafana-config) ---
uds-grafana-config:
  postgresql: {}
grafana: {}

# --- runtime-security (falco) ---
uds-falco-config: {}
falco: {}
