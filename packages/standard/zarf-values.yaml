# Default Zarf values for the full UDS Core (standard) package. This is the union of the
# per-layer values files (base, identity-authorization, logging, monitoring, runtime-security,
# backup-restore). Keys are namespaced by component then chart (component.chart); each maps to
# that chart root. An empty {} is a no-op — chart defaults are preserved while still allowing
# overrides via --values. Every mapped chart must have its component.chart key present here (an
# absent sourcePath is a hard deploy error). See excludePaths in the relevant src/*/zarf.yaml for
# blocked paths.

# Top-level domain for the whole stack; defaults to the DOMAIN Zarf variable
# (backward-compat). Override via --values / --set-values to set the domain once for all charts.
domain: "###ZARF_VAR_DOMAIN###"

# Admin domain override; empty falls back to the ADMIN_DOMAIN variable, then admin.<domain>.
adminDomain: ""

# --- base (pepr / istio / envoy / metrics) ---
pepr-uds-core:
  module: {}
uds-operator-config:
  uds-operator-config: {}
istio-controlplane:
  base: {}
  istiod: {}
  uds-global-istio-config: {}
  cni: {}
  ztunnel: {}
istio-admin-gateway:
  gateway: {}
  uds-istio-config: {}
istio-tenant-gateway:
  gateway: {}
  uds-istio-config: {}
istio-passthrough-gateway:
  gateway: {}
  uds-istio-config: {}
istio-egress-ambient:
  uds-istio-egress-config: {}
istio-egress-gateway:
  gateway: {}
envoy-gateway:
  envoy-gateway: {}
  uds-envoy-gateway-config: {}
kube-prometheus-stack:
  kube-prometheus-stack: {}
  uds-prometheus-config: {}
prometheus-blackbox-exporter:
  prometheus-blackbox-exporter: {}

# --- identity-authorization (keycloak / authservice) ---
keycloak:
  keycloak: {}
authservice:
  authservice: {}

# --- logging (loki / vector) ---
