apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: cirros-import
  namespace: podinfo-vm
spec:
  source:
    registry:
      url: "docker://###ZARF_REGISTRY###/kubevirt/cirros-container-disk-demo:latest"
      pullMethod: node
  pvc:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 1Gi
