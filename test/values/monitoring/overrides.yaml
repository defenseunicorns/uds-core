# Clusterless value-mapping test overrides for the monitoring package.
# For every chart: one settable field set to a recognizable sentinel (asserted PRESENT),
# and one excludePaths entry set to SHOULD_NOT_APPEAR (asserted DROPPED).
kube-prometheus-stack:
  kube-prometheus-stack:
    # Settable: replica count lands on the Prometheus CR spec.
    prometheus:
      prometheusSpec:
        replicas: 7
    # Excluded (.kube-prometheus-stack.kube-prometheus-stack.global.imageRegistry): would
    # prefix every image if not dropped.
    global:
      imageRegistry: SHOULD_NOT_APPEAR
  uds-prometheus-config:
    # Settable: custom network.allow entry lands on the prometheus-stack Package CR.
    # (This UDS-authored config chart carries no excludePaths — all keys stay settable.)
    additionalNetworkAllow:
      - direction: Egress
        remoteGenerated: Anywhere
        description: PROBE_VISIBLE
prometheus-blackbox-exporter:
  prometheus-blackbox-exporter:
    # Settable: replica count lands on the blackbox-exporter Deployment.
    replicas: 7
    # Excluded (.prometheus-blackbox-exporter.prometheus-blackbox-exporter.image): must be dropped.
    image:
      registry: SHOULD_NOT_APPEAR
grafana:
  grafana:
    # Settable: extra label lands on the Grafana workload metadata.
    extraLabels:
      probe: PROBE_VISIBLE
    # Excluded (.grafana.grafana.image): must be dropped.
    image:
      registry: SHOULD_NOT_APPEAR
  uds-grafana-config:
    # Settable: custom network.allow entry lands on the grafana Package CR.
    additionalNetworkAllow:
      - direction: Egress
        remoteGenerated: Anywhere
        description: PROBE_VISIBLE
    # Excluded (.grafana.uds-grafana-config.adminDomain): would appear in Grafana redirect URIs.
    adminDomain: SHOULD_NOT_APPEAR
