values:
  kube-prometheus-stack:
    kube-prometheus-stack:
      prometheus:
        prometheusSpec:
          replicas: 7
      global:
        imageRegistry: SHOULD_NOT_APPEAR
    uds-prometheus-config:
      additionalNetworkAllow:
        - direction: Egress
          remoteGenerated: Anywhere
          description: PROBE_VISIBLE
  prometheus-blackbox-exporter:
    prometheus-blackbox-exporter:
      replicas: 7
      image:
        registry: SHOULD_NOT_APPEAR
  grafana:
    grafana:
      extraLabels:
        probe: PROBE_VISIBLE
      image:
        registry: SHOULD_NOT_APPEAR
    uds-grafana-config:
      additionalNetworkAllow:
        - direction: Egress
          remoteGenerated: Anywhere
          description: PROBE_VISIBLE
      adminDomain: SHOULD_NOT_APPEAR
checks:
  - name: prometheus-replicas
    description: Prometheus CR has seven replicas
    expression:
      '[select(.kind == "Prometheus" and .metadata.name == "kube-prometheus-stack-prometheus")
      | .spec.replicas == 7] | any'
  - name: prometheus-network-allow
    description: Prometheus Package has the supplied network rule
    expression: '[select(.kind == "Package" and .metadata.name == "prometheus-stack")
      | .spec.network.allow[] | select(.description == "PROBE_VISIBLE")] | length >
      0'
  - name: blackbox-replicas
    description: Blackbox exporter Deployment has seven replicas
    expression: '[select(.kind == "Deployment" and .metadata.name == "prometheus-blackbox-exporter")
      | .spec.replicas == 7] | any'
  - name: grafana-pod-label
    description: Grafana Deployment has the supplied probe label
    expression:
      '[select(.kind == "Deployment" and .metadata.name == "grafana") | .metadata.labels.probe
      == "PROBE_VISIBLE"] | any'
  - name: grafana-network-allow
    description: Grafana Package has the supplied network rule
    expression: '[select(.kind == "Package" and .metadata.name == "grafana") | .spec.network.allow[]
      | select(.description == "PROBE_VISIBLE")] | length > 0'
  - name: excluded-values-removed
    description: Excluded values do not appear in rendered manifests
    expression: '[.. | select(tag == "!!str")] | any_c(test("SHOULD_NOT_APPEAR")) |
      not'
  - name: grafana-root-url
    description: Grafana root URL uses the expected admin domain
    expression:
      '[select(.kind == "ConfigMap" and .metadata.name == "grafana") | .data["grafana.ini"]
      | test("root_url = https://grafana\\.{{ adminDomain }}")] | any'
  - name: grafana-redirect-uri
    description: Grafana redirect URI uses the expected admin domain
    expression:
      '[select(.kind == "Package" and .metadata.name == "grafana") | .spec.sso[0].redirectUris[]
      == "https://grafana.{{ adminDomain }}/login/generic_oauth"] | any'
adminDomainScenarios:
  - name: domain-variable-fallback
    values: {}
    variables:
      DOMAIN: fallback.example.com
    expectedAdminDomain: admin.fallback.example.com
  - name: domain-value
    values:
      domain: custom.example.com
      adminDomain: ""
    variables:
      DOMAIN: uds.dev
    expectedAdminDomain: admin.custom.example.com
  - name: admin-domain-value
    values:
      domain: custom.example.com
      adminDomain: mgmt.example.com
    variables:
      DOMAIN: uds.dev
      ADMIN_DOMAIN: ignored.example.com
    expectedAdminDomain: mgmt.example.com
  - name: admin-domain-variable
    values:
      domain: custom.example.com
      adminDomain: ""
    variables:
      DOMAIN: uds.dev
      ADMIN_DOMAIN: myadmin.example.com
    expectedAdminDomain: myadmin.example.com
