# Mirrors the k3d-standard demo bundle's static overrides (bundles/k3d-standard/uds-bundle.yaml,
# the `core` package `overrides:` block) in the component.chart namespace, for the values-deploy
# equivalency test (tasks/test.yaml: uds-core-values-e2e). Only the STATIC config is mirrored here;
# the dynamic deploy-time settings (Postgres creds, S3 keys, TLS certs) stay as Zarf variables
# injected by the dev stack.

# The admin Istio gateway receives this top-level domain as its tenant domain. With no adminDomain
# or ADMIN_DOMAIN, it derives admin.uds.dev.
domain: "uds.dev"

# --- base: pepr (bundle pepr var defaults) ---
pepr-uds-core:
  module:
    watcher:
      resources:
        requests:
          memory: "256Mi"
          cpu: "200m"
    admission:
      resources:
        requests:
          memory: "256Mi"
          cpu: "200m"

# --- identity-authorization ---
authservice:
  authservice:
    replicaCount: 1
keycloak:
  keycloak:
    insecureAdminPasswordGeneration:
      enabled: true
    detailedObservability:
      alerts:
        enabled: true
    realmInitEnv:
      FLEET_CLIENT_ENABLED: "true"
      GOOGLE_IDP_ENABLED: true
      GOOGLE_IDP_ID: "C01881u7t"
      GOOGLE_IDP_SIGNING_CERT: ""
      GOOGLE_IDP_NAME_ID_FORMAT: "urn:oasis:names:tc:SAML:1.1:nameid-format:unspecified"
      GOOGLE_IDP_CORE_ENTITY_ID: "https://sso.uds.dev/realms/uds"
      GOOGLE_IDP_ADMIN_GROUP: "uds-core-dev-admin"
      GOOGLE_IDP_AUDITOR_GROUP: "uds-core-dev-auditor"

# --- logging: loki (bundle var defaults; scaled to 1 for demo/CI) ---
loki:
  loki:
    write:
      replicas: 1
    read:
      replicas: 1
    backend:
      replicas: 1

# --- runtime-security: falco ---
falco:
  falco:
    falcosidekick:
      replicaCount: 1
  uds-falco-config:
    sandboxRulesEnabled: true
    incubatingRulesEnabled: true

# --- backup-restore: velero ---
velero:
  velero:
    configuration:
      backupStorageLocation:
        - name: default
          provider: aws
          bucket: "uds"
          prefix: "backups"
          config:
            region: "uds-dev-stack"
            s3ForcePathStyle: true
            s3Url: "http://minio.uds-dev-stack.svc.cluster.local:9000"
          credential:
            name: "velero-bucket-credentials"
            key: "cloud"
