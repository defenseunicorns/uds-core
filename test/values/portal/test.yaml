values:
  uds-portal:
    uds-portal:
      replicaCount: 7
      image:
        repository: SHOULD_NOT_APPEAR
checks:
  - name: portal-replicas
    description: UDS Portal Deployment has seven replicas
    expression: '[select(.kind == "Deployment" and .metadata.name == "uds-portal") |
      .spec.replicas == 7] | any'
  - name: excluded-values-removed
    description: Excluded values do not appear in rendered manifests
    expression: '[.. | select(tag == "!!str")] | any_c(test("SHOULD_NOT_APPEAR")) |
      not'
adminDomainChecks:
  - name: portal-admin-domain
    description: Portal UDS_ADMIN_DOMAIN uses the expected admin domain
    expression: '[select(.kind == "Deployment" and .metadata.name == "uds-portal") |
      .spec.template.spec.containers[].env[] | select(.name == "UDS_ADMIN_DOMAIN") |
      .value == "{{ adminDomain }}"] | any'
adminDomainScenarios:
  - name: domain-variable-fallback
    values: {}
    variables:
      DOMAIN: fallback.example.com
    expectedAdminDomain: admin.fallback.example.com
  - name: domain-value
    values:
      domain: custom.example.com
      adminDomain: ""
    variables:
      DOMAIN: uds.dev
    expectedAdminDomain: admin.custom.example.com
  - name: admin-domain-value
    values:
      domain: custom.example.com
      adminDomain: mgmt.example.com
    variables:
      DOMAIN: uds.dev
      ADMIN_DOMAIN: ignored.example.com
    expectedAdminDomain: mgmt.example.com
  - name: admin-domain-variable
    values:
      domain: custom.example.com
      adminDomain: ""
    variables:
      DOMAIN: uds.dev
      ADMIN_DOMAIN: myadmin.example.com
    expectedAdminDomain: myadmin.example.com
