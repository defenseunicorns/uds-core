# Clusterless value-mapping test overrides for the portal package.
# For every chart: one settable field set to a recognizable sentinel (asserted PRESENT),
# and one excludePaths entry set to SHOULD_NOT_APPEAR (asserted DROPPED).
uds-portal:
  uds-portal:
    # Settable: replica count lands on the uds-portal Deployment.
    replicaCount: 7
    # Excluded (.uds-portal.uds-portal.image): must be dropped before Helm renders.
    image:
      repository: SHOULD_NOT_APPEAR
