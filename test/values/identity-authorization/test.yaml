values:
  keycloak:
    keycloak:
      podLabels:
        probe: PROBE_VISIBLE
      image:
        repository: SHOULD_NOT_APPEAR
  authservice:
    authservice:
      replicaCount: 7
      image:
        repository: SHOULD_NOT_APPEAR
checks:
  - name: keycloak-pod-label
    description: Keycloak StatefulSet has the supplied probe label
    expression: '[select(.kind == "StatefulSet" and .metadata.name == "keycloak") |
      .spec.template.metadata.labels.probe == "PROBE_VISIBLE"] | any'
  - name: authservice-replicas
    description: Authservice Deployment has seven replicas
    expression: '[select(.kind == "Deployment" and .metadata.name == "authservice")
      | .spec.replicas == 7] | any'
  - name: excluded-values-removed
    description: Excluded values do not appear in rendered manifests
    expression: '[.. | select(tag == "!!str")] | any_c(test("SHOULD_NOT_APPEAR")) |
      not'
adminDomainChecks:
  - name: keycloak-admin-domain
    description: Keycloak UDS_ADMIN_DOMAIN uses the expected admin domain
    expression: '[select(.kind == "StatefulSet" and .metadata.name == "keycloak") |
      .spec.template.spec.containers[].env[] | select(.name == "UDS_ADMIN_DOMAIN") |
      .value == "{{ adminDomain }}"] | any'
