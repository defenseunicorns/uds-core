# Clusterless value-mapping test overrides for the identity-authorization package.
# For every chart: one settable field set to a recognizable sentinel (asserted PRESENT),
# and one excludePaths entry set to SHOULD_NOT_APPEAR (asserted DROPPED).
keycloak:
  keycloak:
    # Settable: pod label lands on the Keycloak StatefulSet pod template.
    podLabels:
      probe: PROBE_VISIBLE
    # Excluded (.keycloak.keycloak.image): must be dropped before Helm renders.
    image:
      repository: SHOULD_NOT_APPEAR
authservice:
  authservice:
    # Settable: replica count lands on the Authservice Deployment.
    replicaCount: 7
    # Excluded (.authservice.authservice.image): must be dropped before Helm renders.
    image:
      repository: SHOULD_NOT_APPEAR
