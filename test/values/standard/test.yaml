values:
  pepr-uds-core:
    module:
      admission:
        podLabels:
          probe: PROBE_PEPR
        image:
          repository: SHOULD_NOT_APPEAR
  uds-operator-config:
    uds-operator-config:
      cluster:
        attributes:
          clusterName: PROBE_OPERATOR
  istio-controlplane:
    base:
      global:
        imagePullSecrets:
          - PROBE_BASE
        hub: SHOULD_NOT_APPEAR
    istiod:
      pilot:
        podLabels:
          probe: PROBE_ISTIOD
      global:
        hub: SHOULD_NOT_APPEAR
    cni:
      cni:
        podLabels:
          probe: PROBE_CNI
      global:
        hub: SHOULD_NOT_APPEAR
    ztunnel:
      podLabels:
        probe: PROBE_ZTUNNEL
      global:
        hub: SHOULD_NOT_APPEAR
    uds-global-istio-config:
      classificationBanner:
        text: CUI//PROBE_GLOBALISTIO
        enabledHosts:
          - "*"
  istio-admin-gateway:
    gateway:
      labels:
        probe: PROBE_ADMINGW
      global:
        hub: SHOULD_NOT_APPEAR
    uds-istio-config:
      tls:
        credentialName: PROBE_ADMINCFG
      name: SHOULD_NOT_APPEAR
  istio-tenant-gateway:
    gateway:
      labels:
        probe: PROBE_TENANTGW
      global:
        hub: SHOULD_NOT_APPEAR
    uds-istio-config:
      tls:
        credentialName: PROBE_TENANTCFG
      name: SHOULD_NOT_APPEAR
  istio-passthrough-gateway:
    gateway:
      labels:
        probe: PROBE_PASSGW
      global:
        hub: SHOULD_NOT_APPEAR
    uds-istio-config:
      rootDomain:
        enabled: true
        tls:
          mode: SIMPLE
          credentialName: PROBE_PASSCFG
      name: SHOULD_NOT_APPEAR
  istio-egress-ambient:
    uds-istio-egress-config:
      config:
        serviceAccount:
          metadata:
            annotations:
              probe: PROBE_EGRESS
  istio-egress-gateway:
    gateway:
      labels:
        probe: PROBE_EGRESSGW
      global:
        hub: SHOULD_NOT_APPEAR
  envoy-gateway:
    envoy-gateway:
      deployment:
        pod:
          labels:
            probe: PROBE_ENVOY
      global:
        imageRegistry: SHOULD_NOT_APPEAR
    uds-envoy-gateway-config: {}
  kube-prometheus-stack:
    kube-prometheus-stack:
      commonLabels:
        probe: PROBE_KPS
      global:
        imageRegistry: SHOULD_NOT_APPEAR
    uds-prometheus-config:
      additionalNetworkAllow:
        - direction: Egress
          description: PROBE_PROMCFG
          remoteGenerated: Anywhere
  prometheus-blackbox-exporter:
    prometheus-blackbox-exporter:
      podAnnotations:
        probe: PROBE_BLACKBOX
      global:
        imageRegistry: SHOULD_NOT_APPEAR
  keycloak:
    keycloak:
      additionalNetworkAllow:
        - direction: Egress
          description: PROBE_KEYCLOAK
          remoteGenerated: Anywhere
      image:
        repository: SHOULD_NOT_APPEAR
  authservice:
    authservice:
      podAnnotations:
        probe: PROBE_AUTHSERVICE
      image:
        repository: SHOULD_NOT_APPEAR
  loki:
    loki:
      loki:
        podLabels:
          probe: PROBE_LOKI
      global:
        imageRegistry: SHOULD_NOT_APPEAR
    uds-loki-config:
      additionalNetworkAllow:
        - direction: Egress
          description: PROBE_LOKICFG
          remoteGenerated: Anywhere
  vector:
    vector:
      podLabels:
        probe: PROBE_VECTOR
      image:
        repository: SHOULD_NOT_APPEAR
    uds-vector-config:
      additionalNetworkAllow:
        - direction: Egress
          description: PROBE_VECTORCFG
          remoteGenerated: Anywhere
  grafana:
    grafana:
      podLabels:
        probe: PROBE_GRAFANA
      global:
        imageRegistry: SHOULD_NOT_APPEAR
    uds-grafana-config:
      additionalNetworkAllow:
        - direction: Egress
          description: PROBE_GRAFANACFG
          remoteGenerated: Anywhere
      domain: SHOULD_NOT_APPEAR
  falco:
    falco:
      podLabels:
        probe: PROBE_FALCO
      image:
        repository: SHOULD_NOT_APPEAR
    uds-falco-config:
      disabledRules:
        - PROBE_FALCOCFG
      udsDefaultDisabledRulesStable:
        - SHOULD_NOT_APPEAR
  metrics-server:
    metrics-server:
      podLabels:
        probe: PROBE_METRICS
      image:
        repository: SHOULD_NOT_APPEAR
    uds-metrics-server-config: {}
  uds-portal:
    uds-portal:
      replicaCount: 7
      image:
        repository: SHOULD_NOT_APPEAR
  velero:
    velero:
      podLabels:
        probe: PROBE_VELERO
      image:
        repository: SHOULD_NOT_APPEAR
    uds-velero-config:
      storage:
        egressCidr: 10.234.56.78/32
checks:
  - name: pepr-pod-label
    description: Pepr Deployment has the supplied probe label
    expression: '[select(.kind == "Deployment" and .metadata.namespace == "pepr-system"
      and .metadata.name == "pepr-uds-core") | .spec.template.metadata.labels.probe
      == "PROBE_PEPR"] | any'
  - name: operator-cluster-name
    description: ClusterConfig has the supplied cluster name
    expression: '[select(.kind == "ClusterConfig" and .metadata.name == "uds-cluster-config")
      | .spec.attributes.clusterName == "PROBE_OPERATOR"] | any'
  - name: istio-base-image-pull-secret
    description: Istio reader ServiceAccount has the supplied image pull secret
    expression:
      '[select(.kind == "ServiceAccount" and .metadata.name == "istio-reader-service-account")
      | .imagePullSecrets[].name == "PROBE_BASE"] | any'
  - name: istiod-pod-label
    description: Istiod Deployment has the supplied probe label
    expression: '[select(.kind == "Deployment" and .metadata.namespace == "istio-system"
      and .metadata.name == "istiod") | .spec.template.metadata.labels.probe == "PROBE_ISTIOD"]
      | any'
  - name: cni-pod-label
    description: Istio CNI DaemonSet has the supplied probe label
    expression: '[select(.kind == "DaemonSet" and .metadata.name == "istio-cni-node")
      | .spec.template.metadata.labels.probe == "PROBE_CNI"] | any'
  - name: ztunnel-pod-label
    description: Ztunnel DaemonSet has the supplied probe label
    expression:
      '[select(.kind == "DaemonSet" and .metadata.name == "ztunnel") | .spec.template.metadata.labels.probe
      == "PROBE_ZTUNNEL"] | any'
  - name: classification-banner
    description: Classification banner includes the supplied text
    expression: '[select(.kind == "EnvoyFilter" and .metadata.name == "classification-banner")
      | @json | test("PROBE_GLOBALISTIO")] | any'
  - name: admin-gateway-pod-label
    description: Admin gateway Deployment has the supplied probe label
    expression: '[select(.kind == "Deployment" and .metadata.namespace == "istio-admin-gateway")
      | .metadata.labels.probe == "PROBE_ADMINGW"] | any'
  - name: admin-gateway-tls
    description: Admin Gateway has the supplied TLS credential
    expression: '[select(.kind == "Gateway" and .metadata.namespace == "istio-admin-gateway")
      | .spec.servers[].tls.credentialName == "PROBE_ADMINCFG"] | any'
  - name: tenant-gateway-pod-label
    description: Tenant gateway Deployment has the supplied probe label
    expression: '[select(.kind == "Deployment" and .metadata.namespace == "istio-tenant-gateway")
      | .metadata.labels.probe == "PROBE_TENANTGW"] | any'
  - name: tenant-gateway-tls
    description: Tenant Gateway has the supplied TLS credential
    expression: '[select(.kind == "Gateway" and .metadata.namespace == "istio-tenant-gateway")
      | .spec.servers[].tls.credentialName == "PROBE_TENANTCFG"] | any'
  - name: passthrough-gateway-pod-label
    description: Passthrough gateway Deployment has the supplied probe label
    expression:
      '[select(.kind == "Deployment" and .metadata.namespace == "istio-passthrough-gateway")
      | .metadata.labels.probe == "PROBE_PASSGW"] | any'
  - name: passthrough-gateway-tls
    description: Passthrough Gateway has the supplied TLS credential
    expression: '[select(.kind == "Gateway" and .metadata.namespace == "istio-passthrough-gateway")
      | .spec.servers[].tls.credentialName == "PROBE_PASSCFG"] | any'
  - name: egress-waypoint-config
    description: Egress waypoint ConfigMap has the supplied annotation
    expression: '[select(.kind == "ConfigMap" and .metadata.name == "egress-waypoint-config")
      | .data.serviceAccount | test("PROBE_EGRESS")] | any'
  - name: egress-gateway-pod-label
    description: Egress gateway Deployment has the supplied probe label
    expression: '[select(.kind == "Deployment" and .metadata.namespace == "istio-egress-gateway")
      | .metadata.labels.probe == "PROBE_EGRESSGW"] | any'
  - name: envoy-gateway-pod-label
    description: Envoy gateway Deployment has the supplied probe label
    expression: '[select(.kind == "Deployment" and .metadata.namespace == "envoy-gateway-system"
      and .metadata.name == "envoy-gateway") | .spec.template.metadata.labels.probe
      == "PROBE_ENVOY"] | any'
  - name: prometheus-operator-pod-label
    description: Prometheus operator Deployment has the supplied probe label
    expression:
      '[select(.kind == "Deployment" and .metadata.name == "kube-prometheus-stack-operator")
      | .metadata.labels.probe == "PROBE_KPS"] | any'
  - name: prometheus-network-allow
    description: Monitoring Package has the supplied network rule
    expression: '[select(.kind == "Package" and .metadata.namespace == "monitoring")
      | .spec.network.allow[].description == "PROBE_PROMCFG"] | any'
  - name: blackbox-pod-annotation
    description: Blackbox exporter Deployment has the supplied annotation
    expression: '[select(.kind == "Deployment" and .metadata.name == "prometheus-blackbox-exporter")
      | .spec.template.metadata.annotations.probe == "PROBE_BLACKBOX"] | any'
  - name: keycloak-network-allow
    description: Keycloak Package has the supplied network rule
    expression: '[select(.kind == "Package" and .metadata.namespace == "keycloak") |
      .spec.network.allow[].description == "PROBE_KEYCLOAK"] | any'
  - name: authservice-pod-annotation
    description: Authservice Deployment has the supplied annotation
    expression: '[select(.kind == "Deployment" and .metadata.namespace == "authservice")
      | .spec.template.metadata.annotations.probe == "PROBE_AUTHSERVICE"] | any'
  - name: loki-pod-label
    description: Loki write StatefulSet has the supplied probe label
    expression: '[select(.kind == "StatefulSet" and .metadata.name == "loki-write")
      | .spec.template.metadata.labels.probe == "PROBE_LOKI"] | any'
  - name: loki-network-allow
    description: Loki Package has the supplied network rule
    expression:
      '[select(.kind == "Package" and .metadata.namespace == "loki") | .spec.network.allow[].description
      == "PROBE_LOKICFG"] | any'
  - name: vector-pod-label
    description: Vector DaemonSet has the supplied probe label
    expression: '[select(.kind == "DaemonSet" and .metadata.namespace == "vector" and
      .metadata.name == "vector") | .spec.template.metadata.labels.probe == "PROBE_VECTOR"]
      | any'
  - name: vector-network-allow
    description: Vector Package has the supplied network rule
    expression:
      '[select(.kind == "Package" and .metadata.namespace == "vector") | .spec.network.allow[].description
      == "PROBE_VECTORCFG"] | any'
  - name: grafana-pod-label
    description: Grafana Deployment has the supplied probe label
    expression: '[select(.kind == "Deployment" and .metadata.namespace == "grafana"
      and .metadata.name == "grafana") | .spec.template.metadata.labels.probe == "PROBE_GRAFANA"]
      | any'
  - name: grafana-network-allow
    description: Grafana Package has the supplied network rule
    expression: '[select(.kind == "Package" and .metadata.namespace == "grafana") |
      .spec.network.allow[].description == "PROBE_GRAFANACFG"] | any'
  - name: falco-pod-label
    description: Falco DaemonSet has the supplied probe label
    expression:
      '[select(.kind == "DaemonSet" and .metadata.name == "falco") | .spec.template.metadata.labels.probe
      == "PROBE_FALCO"] | any'
  - name: falco-disabled-rules
    description: Falco rules ConfigMap has the supplied disabled rule
    expression: '[select(.kind == "ConfigMap" and .metadata.name == "falco-disable-rules")
      | .data["disable-rules.yaml"] | test("PROBE_FALCOCFG")] | any'
  - name: metrics-server-pod-label
    description: Metrics Server Deployment has the supplied probe label
    expression: '[select(.kind == "Deployment" and .metadata.namespace == "metrics-server"
      and .metadata.name == "metrics-server") | .spec.template.metadata.labels.probe
      == "PROBE_METRICS"] | any'
  - name: portal-replicas
    description: UDS Portal Deployment has seven replicas
    expression: '[select(.kind == "Deployment" and .metadata.namespace == "uds-portal"
      and .metadata.name == "uds-portal") | .spec.replicas == 7] | any'
  - name: velero-pod-label
    description: Velero Deployment has the supplied probe label
    expression: '[select(.kind == "Deployment" and .metadata.namespace == "velero")
      | .spec.template.metadata.labels.probe == "PROBE_VELERO"] | any'
  - name: velero-egress-cidr
    description: Velero Package has the supplied egress CIDR
    expression:
      '[select(.kind == "Package" and .metadata.namespace == "velero") | .spec.network.allow[].remoteCidr
      == "10.234.56.78/32"] | any'
  - name: excluded-values-removed
    description: Excluded values do not appear in rendered manifests
    expression: '[.. | select(tag == "!!str")] | any_c(test("SHOULD_NOT_APPEAR")) |
      not'
adminDomainChecks:
  - name: admin-gateway-host
    description: Admin Gateway host uses the expected admin domain
    expression: '[select(.kind == "Gateway" and .metadata.namespace == "istio-admin-gateway")
      | .spec.servers[].hosts[] | test("{{ adminDomain }}$")] | any'
  - name: keycloak-admin-domain
    description: Keycloak UDS_ADMIN_DOMAIN uses the expected admin domain
    expression: '[select(.kind == "StatefulSet" and .metadata.name == "keycloak") |
      .spec.template.spec.containers[].env[] | select(.name == "UDS_ADMIN_DOMAIN") |
      .value == "{{ adminDomain }}"] | any'
  - name: grafana-root-url
    description: Grafana root URL uses the expected admin domain
    expression:
      '[select(.kind == "ConfigMap" and .metadata.name == "grafana") | .data["grafana.ini"]
      | test("root_url = https://grafana\\.{{ adminDomain }}")] | any'
