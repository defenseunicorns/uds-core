values:
  falco:
    falco:
      podLabels:
        probe: PROBE_VISIBLE
      image:
        registry: SHOULD_NOT_APPEAR
    uds-falco-config:
      disabledRules:
        - PROBE_VISIBLE
      udsDefaultDisabledRulesStable:
        - SHOULD_NOT_APPEAR
checks:
  - name: falco-pod-label
    description: Falco DaemonSet has the supplied probe label
    expression:
      '[select(.kind == "DaemonSet" and .metadata.name == "falco") | .spec.template.metadata.labels.probe
      == "PROBE_VISIBLE"] | any'
  - name: falco-disabled-rule
    description: Falco rules ConfigMap has the supplied disabled rule
    expression: '[select(.kind == "ConfigMap" and .metadata.name == "falco-disable-rules")
      | .data["disable-rules.yaml"] | test("PROBE_VISIBLE")] | any'
  - name: excluded-values-removed
    description: Excluded values do not appear in rendered manifests
    expression: '[.. | select(tag == "!!str")] | any_c(test("SHOULD_NOT_APPEAR")) |
      not'
