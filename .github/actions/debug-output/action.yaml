name: debug-output
description: "Print out basic debug info for a k8s cluster"

runs:
  using: composite
  steps:
    - name: Print basic debug info for a k8s cluster
      run: |
        echo "::group::kubectl get all"
        uds zarf tools kubectl get all -A | tee /tmp/debug-k-get-all.log || true
        echo "::endgroup::"
        echo "::group::kubectl get pods -A -o yaml"
        uds zarf tools kubectl get pods -A -o yaml | tee /tmp/debug-k-get-pods.log || true
        echo "::endgroup::"
        echo "::group::kubectl get pv,pvc"
        uds zarf tools kubectl get pv,pvc -A | tee /tmp/debug-k-get-pv-pvc.log || true
        echo "::endgroup::"
        echo "::group::kubectl get package"
        uds zarf tools kubectl get package -A | tee /tmp/debug-k-get-package.log || true
        echo "::endgroup::"
        echo "::group::kubectl get events"
        uds zarf tools kubectl get events -A --sort-by='.lastTimestamp' | tee /tmp/debug-k-get-events.log || true
        echo "::endgroup::"
        echo "::group::kubectl get configmaps,secrets"
        uds zarf tools kubectl get configmaps,secrets -A | tee /tmp/debug-k-get-configmaps-secrets.log || true
        echo "::endgroup::"
        echo "::group::kubectl describe nodes"
        uds zarf tools kubectl describe nodes | tee /tmp/debug-k-describe-node.log || true
        echo "::endgroup::"
        echo "::group::kubectl top"
        uds zarf tools kubectl top nodes | tee /tmp/debug-k-top-node.log || true
        uds zarf tools kubectl top pods -A | tee /tmp/debug-k-top-pods.log || true
        echo "::endgroup::"
        echo "::group::kubectl get endpointslices -A -o yaml"
        uds zarf tools kubectl get endpointslices.discovery.k8s.io -A -o yaml | tee /tmp/debug-k-get-endpointslices.log || true
        echo "::endgroup::"
        echo "::group::kubectl get networkpolicies -A -o yaml"
        uds zarf tools kubectl get networkpolicies.networking.k8s.io -A -o yaml | tee /tmp/debug-k-get-networkpolicies.log || true
        echo "::endgroup::"
        # PolicyEndpoint is the AWS VPC CNI CR that aws-network-policy-agent's eBPF programs
        # consume. Confirms the generated NetworkPolicies were translated to per-pod eBPF state.
        # CRD only exists on EKS with VPC CNI NetworkPolicy enabled; skip when absent.
        if uds zarf tools kubectl get crd policyendpoints.networking.k8s.aws >/dev/null 2>&1; then
          echo "::group::kubectl get policyendpoints -A -o yaml"
          uds zarf tools kubectl get policyendpoints.networking.k8s.aws -A -o yaml | tee /tmp/debug-k-get-policyendpoints.log || true
          echo "::endgroup::"
        fi
      shell: bash
