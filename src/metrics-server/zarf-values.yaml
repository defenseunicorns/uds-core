# Default Zarf values for the Metrics Server package. The top-level key is the component; each
# nested key maps to a chart root. An empty {} is a no-op — chart defaults are preserved while
# still allowing overrides via --values. See excludePaths in common/zarf.yaml for blocked paths.

metrics-server:
  metrics-server: {}
  uds-metrics-server-config: {}
