kind: ZarfPackageConfig
metadata:
  name: uds-core-metrics-server-common
  description: "UDS Metrics Server Common"
  url: https://github.com/kubernetes-sigs/metrics-server

components:
  - name: metrics-server
    required: false # This component is optional since most k8s distros provide this out of the box
    charts:
      - name: uds-metrics-server-config
        namespace: metrics-server
        version: 0.1.0
        localPath: ../chart
        values:
          - sourcePath: .metrics-server.uds-metrics-server-config
            targetPath: .
      - name: metrics-server
        namespace: metrics-server
        url: https://kubernetes-sigs.github.io/metrics-server
        version: 3.13.0
        valuesFiles:
          - "../values/values.yaml"
        values:
          - sourcePath: .metrics-server.metrics-server
            targetPath: .
            excludePaths:
              - .metrics-server.metrics-server.image
              - .metrics-server.metrics-server.podSecurityContext
              - .metrics-server.metrics-server.securityContext
              - .metrics-server.metrics-server.addonResizer.image
              - .metrics-server.metrics-server.addonResizer.securityContext
