# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json

suite: UDS Operator Config - Secret
templates:
  - secret.yaml

tests:
  - it: should render KEYCLOAK_CLIENT_MODE with default CLIENT_SECRET value
    set:
      cluster:
        expose:
          domain: "example.com"
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.KEYCLOAK_CLIENT_MODE
          value: "CLIENT_SECRET"

  - it: should render KEYCLOAK_CLIENT_MODE when set to SIGNED_JWT
    set:
      operator:
        KEYCLOAK_CLIENT_MODE: "SIGNED_JWT"
      cluster:
        expose:
          domain: "example.com"
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.KEYCLOAK_CLIENT_MODE
          value: "SIGNED_JWT"

  - it: should render KEYCLOAK_CLIENT_MODE when set to CLIENT_SECRET
    set:
      operator:
        KEYCLOAK_CLIENT_MODE: "CLIENT_SECRET"
      cluster:
        expose:
          domain: "example.com"
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.KEYCLOAK_CLIENT_MODE
          value: "CLIENT_SECRET"

  - it: should fail when KEYCLOAK_CLIENT_MODE is an invalid value
    set:
      operator:
        KEYCLOAK_CLIENT_MODE: "INVALID"
      cluster:
        expose:
          domain: "example.com"
    asserts:
      - failedTemplate: {}

  - it: should render AUTHSERVICE_REDIS_URI
    set:
      operator:
        AUTHSERVICE_REDIS_URI: "redis://my-redis:6379"
      cluster:
        expose:
          domain: "example.com"
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.AUTHSERVICE_REDIS_URI
          value: "redis://my-redis:6379"
