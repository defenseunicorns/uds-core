apiVersion: uds.dev/v1alpha1
kind: ClusterConfig
metadata:
  name: uds-cluster-config
  labels:
    {{- include "uds-operator-config.labels" . | nindent 4 }}
spec:
  {{- if or .Values.cluster.attributes.clusterName .Values.cluster.attributes.clusterTags }}
  attributes:
    {{- if .Values.cluster.attributes.clusterName }}
    clusterName: {{ .Values.cluster.attributes.clusterName | quote }}
    {{- end }}
    {{- if .Values.cluster.attributes.clusterTags }}
    tags:
      {{- toYaml .Values.cluster.attributes.clusterTags | nindent 6 }}
    {{- end }}
  {{- end }}
  caBundle:
    {{- if .Values.cluster.caBundle.certs }}
    certs: {{ .Values.cluster.caBundle.certs | quote }}
    {{- end }}
    includeDoDCerts: {{ .Values.cluster.caBundle.includeDoDCerts | default false | toString | eq "true" }}
    includePublicCerts: {{ .Values.cluster.caBundle.includePublicCerts | default false | toString | eq "true" }}
  {{- if or .Values.cluster.networking.kubeApiCIDR .Values.cluster.networking.kubeNodeCIDRs }}
  networking:
    {{- if .Values.cluster.networking.kubeApiCIDR }}
    kubeApiCIDR: {{ .Values.cluster.networking.kubeApiCIDR | quote }}
    {{- end }}
    {{- if .Values.cluster.networking.kubeNodeCIDRs }}
    kubeNodeCIDRs:
      {{- toYaml .Values.cluster.networking.kubeNodeCIDRs | nindent 6 }}
    {{- end }}
  {{- end }}
  expose:
    domain: {{ .Values.cluster.expose.domain | quote }}
    adminDomain: {{ include "uds-operator-config.adminDomain" . | quote }}
    {{- $contextPath := .Values.cluster.expose.contextPath | default "" }}
    {{- if and (ne $contextPath "") (not (hasPrefix "###ZARF_VAR_" $contextPath)) }}
    contextPath: {{ $contextPath | quote }}
    {{- end }}
    {{- $adminContextPath := .Values.cluster.expose.adminContextPath | default "" }}
    {{- if and (ne $adminContextPath "") (not (hasPrefix "###ZARF_VAR_" $adminContextPath)) }}
    adminContextPath: {{ $adminContextPath | quote }}
    {{- end }}
    pathRouting: {{ .Values.cluster.expose.pathRouting | default false | toString | eq "true" }}
  policy:
    allowAllNsExemptions: {{ .Values.cluster.policy.allowAllNsExemptions }}
