apiVersion: zarf.dev/v1beta1
kind: ZarfComponentConfig
metadata:
  name: pepr-uds-core
component:
  charts:
    - name: module
      namespace: pepr-system
      local:
        path: ../../dist/uds-core-chart
      valuesFiles:
        - values.yaml
  images:
    - name: ghcr.io/defenseunicorns/pepr/controller:v1.1.0
  actions:
    onDeploy:
      onSuccess:
        - description: Validate ClusterConfig
          maxTotalSeconds: 60
          wait:
            cluster:
              kind: ClusterConfig
              name: uds-cluster-config
              condition: "'{.status.phase}'=Ready"
