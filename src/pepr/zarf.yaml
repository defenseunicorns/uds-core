kind: ZarfPackageConfig
metadata:
  name: pepr-uds-core
  description: "Pepr Module: A collection of capabilities for UDS Core"
  url: https://github.com/defenseunicorns/pepr

variables:
  - name: DOMAIN
    description: "Cluster domain"
    default: "uds.dev"

  - name: ADMIN_DOMAIN
    description: "Domain for admin services, defaults to `admin.DOMAIN`"

  - name: CA_BUNDLE_CERTS
    description: "Base64 encoded CA certs (bundle) in PEM format that UDS Core will inherently trust. At a minimum this must at least include your Domain CA Cert if using Private PKI for your UDS Core Deployment"
    default: ""

  - name: CA_BUNDLE_INCLUDE_DOD_CERTS
    description: "Whether to include DoD root and intermediate certificates in the cluster CA bundle"
    default: false

  - name: CA_BUNDLE_INCLUDE_PUBLIC_CERTS
    description: "Whether to include public root and intermediate certificates in the cluster CA bundle"
    default: false

  - name: UDS_LOG_LEVEL
    description: "UDS Operator log level"
    default: "debug"

  - name: AUTHSERVICE_REDIS_URI
    description: "UDS Authservice Redis URI"
    default: ""

  - name: PEPR_SERVICE_MONITORS
    description: "Enables Service Monitors for Pepr services (watcher, admission)"
    default: "true"

  - name: ALLOW_ALL_NS_EXEMPTIONS
    description: "Whether to allow exemptions to be created in all namespaces"
    default: "false"

values:
  files:
    - zarf-values.yaml

components:
  - name: uds-crds
    required: true
    charts:
      - name: uds-cluster-crds
        namespace: pepr-system
        version: 0.2.0
        localPath: uds-cluster-crds
    actions:
      onDeploy:
        before:
          - description: Handle Helm ownership metadata change on upgrade
            cmd: |
              # Update Helm ownership metadata for existing Packages and Exemptions CRDs
              CRDS="packages.uds.dev exemptions.uds.dev"

              for crd in $CRDS; do
                if ./zarf tools kubectl get crd "$crd" >/dev/null 2>&1; then
                  ./zarf tools kubectl label crd "$crd" \
                    app.kubernetes.io/managed-by=Helm --overwrite

                  ./zarf tools kubectl annotate crd "$crd" \
                    meta.helm.sh/release-name="uds-cluster-crds" \
                    meta.helm.sh/release-namespace="pepr-system" \
                    --overwrite
                fi
              done

  - name: uds-operator-config
    required: true
    charts:
      - name: uds-operator-config
        namespace: pepr-system
        version: 0.1.0
        localPath: uds-operator-config
        valuesFiles:
          - uds-operator-config/values.yaml
        # UDS-authored config chart, exposed broadly (no image/securityContext values to block).
        # `domain` is fed from the top-level `domain` value (below) so `.cluster` is not excluded
        # (excluding a key a sibling mapping targets breaks schema generation).
        values:
          - sourcePath: .uds-operator-config.uds-operator-config
            targetPath: .
          - sourcePath: .domain
            targetPath: .cluster.expose.domain
          - sourcePath: .adminDomain
            targetPath: .cluster.expose.udsAdminDomain
    actions:
      onDeploy:
        after:
          - description: "Ensure Istio Ambient is enabled for Pepr"
            cmd: |
              echo "Setting Ambient mode for pepr-system..."
              ./zarf tools kubectl label namespace pepr-system "istio.io/dataplane-mode"="ambient" --overwrite

              echo "Disabling istio-injection on pepr-system..."
              ./zarf tools kubectl label namespace pepr-system istio-injection=disabled --overwrite

  - name: pepr-uds-core
    required: true
    import:
      name: module
      path: ../../dist
    charts:
      - name: module
        valuesFiles:
          - values.yaml
        # Pass-through of the Pepr controller chart. The excluded paths carry UDS-specific wiring
        # (Keycloak token mounts, ZARF_VAR substitutions, enforcer bypass, service monitors) that
        # must not be overridden, plus the controller image and security contexts (blocked to
        # prevent unauthorized images and privilege changes).
        values:
          - sourcePath: .pepr-uds-core.module
            targetPath: .
            excludePaths:
              - .pepr-uds-core.module.watcher.env
              - .pepr-uds-core.module.admission.env
              - .pepr-uds-core.module.watcher.extraVolumeMounts
              - .pepr-uds-core.module.watcher.extraVolumes
              - .pepr-uds-core.module.admission.extraVolumeMounts
              - .pepr-uds-core.module.admission.extraVolumes
              - .pepr-uds-core.module.watcher.serviceMonitor
              - .pepr-uds-core.module.admission.serviceMonitor
              - .pepr-uds-core.module.admission.webhookAnnotations
              - .pepr-uds-core.module.admission.image
              - .pepr-uds-core.module.watcher.image
              - .pepr-uds-core.module.admission.securityContext
              - .pepr-uds-core.module.admission.containerSecurityContext
              - .pepr-uds-core.module.watcher.securityContext
              - .pepr-uds-core.module.watcher.containerSecurityContext
    actions:
      onDeploy:
        after:
          - description: Validate ClusterConfig
            maxTotalSeconds: 60
            wait:
              cluster:
                kind: ClusterConfig
                name: uds-cluster-config
                condition: "'{.status.phase}'=Ready"

  - name: uds-exemptions
    required: true
    charts:
      - name: uds-exemptions
        namespace: uds-policy-exemptions
        version: 0.1.0
        localPath: uds-exemptions
        valuesFiles:
          - uds-exemptions/values.yaml
