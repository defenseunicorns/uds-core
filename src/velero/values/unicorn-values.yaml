image:
  repository: cgr.dev/defenseunicorns.com/velero-fips
  tag: 1.18.0

initContainers:
  - name: velero-plugin-for-aws
    image: cgr.dev/defenseunicorns.com/velero-plugin-for-aws-fips:1.14.0
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins
  - name: velero-plugin-for-azure
    image: cgr.dev/defenseunicorns.com/velero-plugin-for-microsoft-azure-fips:1.14.0
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins
