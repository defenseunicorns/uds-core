{{- if .Capabilities.APIVersions.Has "monitoring.coreos.com/v1" }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: uds-velero-uptime
  namespace: {{ .Release.Namespace }}
spec:
  groups:
    - name: uds-backup-restore-uptime
      rules:
        - record: uds:velero:up
          labels:
            uds_layer: backup-restore
            uds_component: velero
          expr: |
            (
              clamp_max(kube_deployment_status_replicas_available{deployment="velero", namespace="velero"}, 1)
              or on()
              (absent(kube_deployment_status_replicas_available{deployment="velero", namespace="velero"}) * 0)
            )
            * on() group_left()
            kube_state_metrics:up
{{- end }}
