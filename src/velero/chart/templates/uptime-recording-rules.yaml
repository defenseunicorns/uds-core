{{- if .Capabilities.APIVersions.Has "monitoring.coreos.com/v1" }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: uds-velero-uptime
  namespace: {{ .Release.Namespace }}
spec:
  groups:
    - name: uds-backup-restore-uptime
      rules:
        - record: uds:velero:up
          labels:
            uds_layer: backup-restore
            uds_component: velero
          expr: |
            (max(deployment:up{deployment="velero", namespace="velero"}) or on() vector(0))
            and on()
            (kube_state_metrics:up == 1)
{{- end }}
