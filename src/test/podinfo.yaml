apiVersion: zarf.dev/v1beta1
kind: ZarfComponentConfig
metadata:
  name: podinfo
component:
  charts:
    - name: uds-podinfo-config
      namespace: podinfo
      local:
        path: ./chart
    - name: podinfo
      namespace: podinfo
      git:
        url: https://github.com/stefanprodan/podinfo.git@6.11.2
        path: charts/podinfo
      valuesFiles:
        - ./podinfo-values.yaml
  images:
    - name: ghcr.io/stefanprodan/podinfo:6.11.2
