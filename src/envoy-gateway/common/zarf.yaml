kind: ZarfPackageConfig
metadata:
  name: uds-core-envoy-gateway-common
  description: "UDS Core Envoy Gateway Common"
  url: https://github.com/envoyproxy/gateway

components:
  - name: envoy-gateway
    required: false
    manifests:
      - name: envoy-gateway-class
        namespace: envoy-gateway-system
        files:
          - ../manifests/gatewayclass.yaml
    charts:
      - name: uds-envoy-gateway-config
        namespace: envoy-gateway-system
        version: 0.1.0
        localPath: ../chart
      - name: envoy-gateway
        namespace: envoy-gateway-system
        url: oci://docker.io/envoyproxy/gateway-helm
        version: v1.8.0
        # Disable SSA to prevent field manager conflicts with Istio's Gateway API CRDs.
        # Istio installs safe-upgrades.gateway.networking.k8s.io VAP with field manager "uds";
        # SSA mode causes a conflict when this chart tries to apply the same VAP on install.
        serverSideApply: "false"
        valuesFiles:
          - "../values/values.yaml"
