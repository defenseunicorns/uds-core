kind: ZarfPackageConfig
metadata:
  name: uds-core-envoy-gateway-common
  description: "UDS Core Envoy Gateway Common"
  url: https://github.com/envoyproxy/gateway

components:
  - name: envoy-gateway-crds
    required: false
    files:
      # Fetched at package create time and applied at deploy time to avoid Helm's
      # release secret size limit with the generated EnvoyProxy CRD.
      - source: https://github.com/envoyproxy/gateway/releases/download/v1.8.0/envoy-gateway-crds.yaml
        target: /tmp/uds-core-envoy-gateway-crds.yaml
    actions:
      onDeploy:
        after:
          - description: Apply Envoy Gateway CRDs
            cmd: ./zarf tools kubectl apply --server-side=true --force-conflicts --field-manager=uds -f /tmp/uds-core-envoy-gateway-crds.yaml

  - name: envoy-gateway
    required: false
    charts:
      - name: envoy-gateway
        namespace: envoy-gateway-system
        url: oci://docker.io/envoyproxy/gateway-helm
        version: v1.8.0
        # SSA disabled to avoid field manager conflict: the chart's crds/ dir contains the
        # safe-upgrades.gateway.networking.k8s.io VAP, which Istio already owns with field
        # manager "uds". SSA causes a conflict on the .spec.matchConstraints field.
        # Once https://github.com/envoyproxy/gateway/issues/8560 lands we can skip CRDs
        # entirely and remove this.
        serverSideApply: "false"
        valuesFiles:
          - "../values/values.yaml"
    actions:
      onDeploy:
        before:
          - description: Wait for EnvoyProxy CRD to exist
            cmd: |
              set -e
              for i in $(seq 1 60); do
                if ./zarf tools kubectl get crd envoyproxies.gateway.envoyproxy.io >/dev/null 2>&1; then
                  exit 0
                fi
                sleep 2
              done
              echo "Timed out waiting for CRD envoyproxies.gateway.envoyproxy.io" >&2
              exit 1
