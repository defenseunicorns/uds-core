{{- if .Capabilities.APIVersions.Has "monitoring.coreos.com/v1" }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: uds-falco-uptime
  namespace: {{ .Release.Namespace }}
spec:
  groups:
    - name: uds-runtime-security-uptime
      rules:
        - record: uds:falco:up
          labels:
            uds_layer: runtime-security
            uds_component: falco
          expr: |
            (
              (kube_daemonset_status_number_unavailable{daemonset="falco", namespace="falco"} == 0) * 0 + 1
              or on(daemonset, namespace)
              clamp_max(daemonset:desired_scheduled:changed_recently{daemonset="falco", namespace="falco"}, 1)
              or on(daemonset, namespace)
              clamp_max(kube_daemonset_status_desired_number_scheduled{daemonset="falco", namespace="falco"}, 1) * 0
              or on()
              (absent(kube_daemonset_status_desired_number_scheduled{daemonset="falco", namespace="falco"}) * 0)
            )
            * on() group_left()
            kube_state_metrics:up

        - record: uds:falcosidekick:up
          labels:
            uds_layer: runtime-security
            uds_component: falco-sidekick
          expr: |
            (
              (kube_deployment_status_replicas_unavailable{deployment="falco-falcosidekick", namespace="falco"} == 0) * 0 + 1
              or on(deployment, namespace)
              clamp_max(deployment:replicas:changed_recently{deployment="falco-falcosidekick", namespace="falco"}, 1)
              or on(deployment, namespace)
              clamp_max(kube_deployment_spec_replicas{deployment="falco-falcosidekick", namespace="falco"}, 1) * 0
              or on()
              (absent(kube_deployment_spec_replicas{deployment="falco-falcosidekick", namespace="falco"}) * 0)
            )
            * on() group_left()
            kube_state_metrics:up
{{- end }}
