apiVersion: zarf.dev/v1beta1
kind: ZarfComponentConfig
metadata:
  name: falco
  description: "Deploy Falco"
component:
  target:
    flavor: unicorn
  import:
    paths:
      - ../common/falco.yaml
  charts:
    - name: falco
      valuesFiles:
        - ../values/unicorn-values.yaml
  images:
    - name: quay.io/rfcurated/falcosecurity/falco:0.43.1-jammy-scratch-fips-rfcurated
    - name: quay.io/rfcurated/falcosecurity/falcosidekick:2.33.0-jammy-scratch-fips-rfcurated
