kind: ZarfPackageConfig
metadata:
  name: uds-core-falco-common
  description: "UDS Core Falco Common"
  url: https://falco.org/docs/

components:
  - name: falco
    description: "Deploy Falco"
    required: true
    charts:
      - name: uds-falco-config
        namespace: falco
        version: 0.1.0
        localPath: ../chart
        valuesFiles:
          - ../chart/values.yaml
        # UDS-authored config chart for Falco rules. Exclude internal UDS-managed disabled-rule
        # lists so users cannot accidentally clear the UDS baseline suppressions.
        values:
          - sourcePath: .falco.uds-falco-config
            targetPath: .
            excludePaths:
              - .falco.uds-falco-config.udsDefaultDisabledRulesStable
              - .falco.uds-falco-config.udsDefaultDisabledRulesIncubating
              - .falco.uds-falco-config.udsDefaultDisabledRulesSandbox
      - name: falco
        url: https://falcosecurity.github.io/charts
        version: 9.1.0
        namespace: falco
        valuesFiles:
          - ../values/values.yaml
        # Falco is an upstream chart exposed broadly. Exclude image references (to prevent pulling
        # unauthorized images) and security contexts (to prevent privilege escalation).
        values:
          - sourcePath: .falco.falco
            targetPath: .
            excludePaths:
              - .falco.falco.image
              - .falco.falco.falcosidekick.image
              - .falco.falco.podSecurityContext
              - .falco.falco.containerSecurityContext
              - .falco.falco.falcosidekick.podSecurityContext
              - .falco.falco.falcosidekick.securityContext
              - .falco.falco.falcosidekick.containerSecurityContext
              - .falco.falco.driver.loader.initContainer.image
              - .falco.falco.driver.loader.initContainer.securityContext
              - .falco.falco.falcoctl.image
              - .falco.falco.falcoctl.artifact.install.securityContext
              - .falco.falco.falcoctl.artifact.follow.securityContext
