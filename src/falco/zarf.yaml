kind: ZarfPackageConfig
metadata:
  # @lulaStart 98dd4970-223e-458d-8b49-7432ace5331d
  # @lulaStart cd540e07-153b-424c-90e0-c0daec56b16a
  name: uds-core-falco
  description: "UDS Core Falco"
  url: https://falco.org/docs/
  # @lulaEnd cd540e07-153b-424c-90e0-c0daec56b16a
  # @lulaEnd 98dd4970-223e-458d-8b49-7432ace5331d

values:
  files:
    - zarf-values.yaml

components:
  - name: falco
    description: "Deploy Falco"
    required: true
    only:
      flavor: upstream
    import:
      path: common
    charts:
      - name: falco
        valuesFiles:
          - values/upstream-values.yaml
    images:
      - docker.io/falcosecurity/falco:0.44.1
      - docker.io/falcosecurity/falcosidekick:2.34.1

  - name: falco
    description: "Deploy Falco"
    required: true
    only:
      flavor: registry1
    import:
      path: common
    charts:
      - name: falco
        valuesFiles:
          - values/registry1-values.yaml
    images:
      - registry1.dso.mil/ironbank/opensource/falcosecurity/falco:0.44.1
      - registry1.dso.mil/ironbank/opensource/falcosecurity/falcosidekick:2.34.1

  - name: falco
    description: "Deploy Falco"
    required: true
    only:
      flavor: unicorn
    import:
      path: common
    charts:
      - name: falco
        valuesFiles:
          - values/unicorn-values.yaml
    images:
      - cgr.dev/defenseunicorns.com/falco-fips:v0.44.1
      - cgr.dev/defenseunicorns.com/falcosidekick-fips:v2.34.1
