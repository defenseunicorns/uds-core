kind: ZarfPackageConfig
metadata:
  name: uds-core-portal-common
  description: "UDS Core Portal Common"
  url: "https://github.com/defenseunicorns/uds-portal"

components:
  - name: uds-portal
    required: true
    charts:
      - name: uds-portal
        namespace: uds-portal
        # renovate: datasource=github-releases depName=defenseunicorns/uds-portal
        version: "v0.4.0"
        url: https://github.com/defenseunicorns/uds-portal.git
        gitPath: chart
        valuesFiles:
          - ../values/values.yaml
        # Portal chart exposed broadly. Image references and security contexts are excluded to
        # prevent pulling unauthorized images and privilege escalation. The .domain fan-out keeps
        # setting .package.domain for backward-compat.
        values:
          - sourcePath: .uds-portal.uds-portal
            targetPath: .
            excludePaths:
              - .uds-portal.uds-portal.image
              - .uds-portal.uds-portal.podSecurityContext
              - .uds-portal.uds-portal.containerSecurityContext
          - sourcePath: .domain
            targetPath: .package.domain
