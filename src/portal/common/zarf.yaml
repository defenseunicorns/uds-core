kind: ZarfPackageConfig
metadata:
  name: uds-core-portal-common
  description: "UDS Core Portal Common"
  url: "https://github.com/defenseunicorns/uds-portal"

components:
  - name: uds-portal
    required: true
    charts:
      - name: uds-portal-config
        namespace: uds-portal
        version: 0.1.0
        localPath: ../chart
        valuesFiles:
          - ../chart/values.yaml
      - name: uds-portal
        namespace: uds-portal
        # renovate: datasource=github-releases depName=defenseunicorns/uds-portal
        version: "v0.4.0"
        url: https://github.com/defenseunicorns/uds-portal.git
        gitPath: chart
        valuesFiles:
          - ../values/values.yaml
    actions:
      onDeploy:
        before:
          - description: Handle Helm ownership metadata change on upgrade
            cmd: |
              if ./zarf tools kubectl get package uds-portal -n uds-portal >/dev/null 2>&1; then
                ./zarf tools kubectl label package uds-portal -n uds-portal app.kubernetes.io/managed-by=Helm --overwrite
                ./zarf tools kubectl annotate package uds-portal -n uds-portal helm.sh/resource-policy=keep --overwrite
                ./zarf tools kubectl annotate package uds-portal -n uds-portal meta.helm.sh/release-name=uds-portal-config --overwrite
                ./zarf tools kubectl annotate package uds-portal -n uds-portal meta.helm.sh/release-namespace=uds-portal --overwrite
              fi
        after:
          - description: Remove temporary Helm keep annotation
            cmd: |
              ./zarf tools kubectl annotate package uds-portal -n uds-portal helm.sh/resource-policy- || true
