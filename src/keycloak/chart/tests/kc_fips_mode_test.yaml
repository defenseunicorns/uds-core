# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json

suite: Keycloak - FIPS mode always enabled
templates:
  - statefulset.yaml
  - secret-kc-realm.yaml

tests:
  - it: should always include FIPS feature flag in container args
    template: statefulset.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--features=preview,fips"

  - it: should always include FIPS strict mode in container args
    template: statefulset.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--fips-mode=strict"

  - it: should set FIPS_ENABLED to true in realm secret
    template: secret-kc-realm.yaml
    asserts:
      - equal:
          path: data.FIPS_ENABLED
          value: "dHJ1ZQ=="

  - it: should always include BCFKS key store type in container args
    template: statefulset.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--https-key-store-type=bcfks"

  - it: should always include BCFKS trust store type in container args
    template: statefulset.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--https-trust-store-type=bcfks"

  - it: should delete both PKCS12 and BCFKS truststores in migration init container
    template: statefulset.yaml
    set:
      migrations:
        deleteGeneratedTrustStore: true
    asserts:
      - matchRegex:
          path: spec.template.spec.initContainers[1].command[2]
          pattern: "keycloak-truststore\\.p12"
      - matchRegex:
          path: spec.template.spec.initContainers[1].command[2]
          pattern: "keycloak-truststore\\.bcfks"
