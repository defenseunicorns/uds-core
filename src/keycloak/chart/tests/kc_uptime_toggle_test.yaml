# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json

suite: Keycloak - Uptime Probe Toggle
templates:
  - uds-package.yaml

tests:
  - it: should include public and admin uptime blocks when uptime.enabled is true
    set:
      uptime:
        enabled: true
    template: uds-package.yaml
    asserts:
      - contains:
          path: spec.network.expose
          any: true
          content:
            uptime:
              checks:
                paths:
                  - /
                  - /realms/uds/.well-known/openid-configuration

      - notContains:
          path: spec.network.expose
          any: true
          content:
            gateway: admin
            uptime:
              checks:
                paths:
                  - /realms/uds/.well-known/openid-configuration

      - contains:
          path: spec.network.expose
          any: true
          content:
            gateway: admin
            uptime:
              checks:
                paths:
                  - /

  - it: should not include uptime blocks when uptime.enabled is false
    set:
      uptime:
        enabled: false
    template: uds-package.yaml
    asserts:
      - notContains:
          path: spec.network.expose
          any: true
          content:
            uptime:
              checks:
                paths:
                  - /
                  - /realms/uds/.well-known/openid-configuration

      - notContains:
          path: spec.network.expose
          any: true
          content:
            uptime:
              checks:
                paths:
                  - /

  - it: should include public and admin uptime blocks when uptime object is overridden without enabled key
    set:
      uptime: {}
    template: uds-package.yaml
    asserts:
      - contains:
          path: spec.network.expose
          any: true
          content:
            uptime:
              checks:
                paths:
                  - /
                  - /realms/uds/.well-known/openid-configuration

      - notContains:
          path: spec.network.expose
          any: true
          content:
            gateway: admin
            uptime:
              checks:
                paths:
                  - /realms/uds/.well-known/openid-configuration

      - contains:
          path: spec.network.expose
          any: true
          content:
            gateway: admin
            uptime:
              checks:
                paths:
                  - /

  - it: should include only path-aware public uptime block when path routing is enabled
    set:
      pathRouting: true
      contextPath: /xyz
      adminContextPath: /admin
      uptime:
        enabled: true
    template: uds-package.yaml
    asserts:
      - contains:
          path: spec.network.expose
          any: true
          content:
            host: .
            uptime:
              checks:
                paths:
                  - /xyz/sso
                  - /xyz/sso/realms/uds/.well-known/openid-configuration

      - notContains:
          path: spec.network.expose
          any: true
          content:
            host: .
            gateway: admin
            uptime:
              checks:
                paths:
                  - /

  - it: should still render expose entries when uptime is disabled
    set:
      uptime:
        enabled: false
    template: uds-package.yaml
    asserts:
      - contains:
          path: spec.network.expose
          any: true
          content:
            service: keycloak-http
            port: 8080

      - contains:
          path: spec.network.expose
          any: true
          content:
            gateway: admin
            service: keycloak-http
            port: 8080
