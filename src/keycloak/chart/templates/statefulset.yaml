apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "keycloak.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
    {{- range $key, $value := .Values.statefulsetLabels }}
    {{- printf "%s: %s" $key (tpl $value $ | quote) | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "keycloak.selectorLabels" . | nindent 6 }}
  serviceName: {{ include "keycloak.fullname" . }}-headless
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: {{ .Values.updateStrategy }}
  template:
    metadata:
      labels:
        {{- include "keycloak.selectorLabels" . | nindent 8 }}
        {{- range $key, $value := .Values.podLabels }}
        {{- printf "%s: %s" $key (tpl $value $ | quote) | nindent 8 }}
        {{- end }}
        istio.io/use-waypoint: {{ include "keycloak.fullname" . }}-waypoint
        istio.io/ingress-use-waypoint: "true"
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if not .Values.devMode }}
        postgres-hash: {{ include (print $.Template.BasePath "/secret-postgresql.yaml") . | sha256sum }}
        kc-realm-hash: {{ include (print $.Template.BasePath "/secret-kc-realm.yaml") . | sha256sum }}
        {{- end }}
    spec:
      securityContext:
      {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: uds-config
          image: "{{ .Values.configImage }}"
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
          volumeMounts:
            - name: providers
              mountPath: /opt/keycloak/providers
            - name: data
              mountPath: /opt/keycloak/data
            - name: themes
              mountPath: /opt/keycloak/themes
            - name: conf
              mountPath: /opt/keycloak/conf
            {{- if .Values.themeCustomizations }}
            - name: theme-overrides
              mountPath: /opt/keycloak/theme-overrides
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "keycloak.fullname" . }}-realm-env
        {{- if .Values.migrations.deleteGeneratedTrustStore }}
        - name: remove-generated-truststore
          image: "{{ .Values.configImage }}"
          command: ["sh", "-c", "rm -rf /opt/keycloak/data/keycloak-truststore.p12 /opt/keycloak/data/keycloak-truststore.bcfks ; ls -la /opt/keycloak/data"]
          securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
          volumeMounts:
            - name: data
              mountPath: /opt/keycloak/data
        {{- end }}
        # Generates a BCFKS truststore from all certificate sources (DoD CAs in conf/truststores,
        # the UDS trust bundle, and the Kubernetes service account CA) and points Keycloak at it
        # via JAVA_OPTS_APPEND. Keycloak's upstream TruststoreBuilder hardcodes PKCS12, which is
        # not FIPS-compliant, so we build the truststore ourselves and clear conf/truststores to
        # prevent Quarkus auto-discovery from regenerating a PKCS12 truststore at startup.
        - name: generate-bcfks-truststore
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
          command:
            - sh
            - -c
            - |
              set -eu

              TRUSTSTORE_PASSWORD="keycloakchangeit"
              BCFKS_OUT="/opt/keycloak/data/keycloak-truststore.bcfks"
              CONF_TRUSTSTORES="/opt/keycloak/conf/truststores"
              CA_CERTS_DIR="/tmp/ca-certs"
              SA_CA="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

              # The BC FIPS jars are placed in providers/ by the uds-config init container.
              CP=$(ls /opt/keycloak/providers/bc-fips-*.jar \
                      /opt/keycloak/providers/bctls-fips-*.jar \
                      /opt/keycloak/providers/bcutil-fips-*.jar \
                      /opt/keycloak/providers/bcpkix-fips-*.jar 2>/dev/null | tr '\n' ':')
              if [ -z "$CP" ]; then
                echo "ERROR: BouncyCastle FIPS jars not found in /opt/keycloak/providers" >&2
                exit 1
              fi

              WORKDIR=$(mktemp -d)
              SPLITDIR="$WORKDIR/split"
              COLLECT="$WORKDIR/sources"
              mkdir -p "$SPLITDIR" "$COLLECT"

              # Start from a clean truststore so reruns are idempotent.
              rm -f "$BCFKS_OUT"

              # Collect every PEM source file into a staging directory.
              i=0
              add_source() {
                src="$1"
                [ -f "$src" ] || return 0
                grep -q "BEGIN CERTIFICATE" "$src" 2>/dev/null || return 0
                cp "$src" "$COLLECT/src-$i.pem"
                i=$((i + 1))
              }

              if [ -d "$CONF_TRUSTSTORES" ]; then
                for f in "$CONF_TRUSTSTORES"/*; do add_source "$f"; done
              fi
              if [ -d "$CA_CERTS_DIR" ]; then
                for f in "$CA_CERTS_DIR"/*; do add_source "$f"; done
              fi
              add_source "$SA_CA"

              # Split each (potentially multi-cert) PEM bundle and import each cert individually,
              # since keytool -importcert only reads the first certificate from a bundle.
              n=0
              for src in "$COLLECT"/*.pem; do
                [ -f "$src" ] || continue
                rm -f "$SPLITDIR"/cert-*.pem
                ( cd "$SPLITDIR" && csplit -z -f cert- -b "%04d.pem" "$src" "/-----BEGIN CERTIFICATE-----/" "{*}" >/dev/null 2>&1 ) || true
                for c in "$SPLITDIR"/cert-*.pem; do
                  [ -f "$c" ] || continue
                  if keytool -importcert -noprompt \
                       -alias "udsca-$n" \
                       -file "$c" \
                       -keystore "$BCFKS_OUT" \
                       -storetype bcfks \
                       -providername BCFIPS \
                       -providerclass org.bouncycastle.jcajce.provider.BouncyCastleFipsProvider \
                       -providerpath "$CP" \
                       -storepass "$TRUSTSTORE_PASSWORD" \
                       -trustcacerts >/dev/null 2>&1; then
                    n=$((n + 1))
                  else
                    echo "WARNING: failed to import certificate from $c" >&2
                  fi
                done
              done

              rm -rf "$WORKDIR"

              if [ "$n" -eq 0 ]; then
                echo "ERROR: no certificates were imported into the BCFKS truststore" >&2
                exit 1
              fi
              echo "Imported $n certificate(s) into $BCFKS_OUT"

              # Clear conf/truststores so Keycloak's Quarkus auto-discovery does not run
              # TruststoreBuilder (which would create a non-FIPS PKCS12 truststore) at startup.
              if [ -d "$CONF_TRUSTSTORES" ]; then
                rm -rf "$CONF_TRUSTSTORES"/* "$CONF_TRUSTSTORES"/.[!.]* 2>/dev/null || true
              fi
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
          volumeMounts:
            - name: providers
              mountPath: /opt/keycloak/providers
            - name: data
              mountPath: /opt/keycloak/data
            - name: conf
              mountPath: /opt/keycloak/conf
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- if and .Release.IsUpgrade .Values.migrations.upgradePermissions (or .Values.devMode .Values.persistence.data.enabled .Values.persistence.themes.enabled .Values.persistence.conf.enabled .Values.persistence.providers.enabled) }}
        - name: fix-volume-permissions
          image: "{{ .Values.configImage }}"
          command:
            - sh
            - -c
            - |
              set -eu
              {{- if or .Values.persistence.data.enabled .Values.devMode }}
              chown -R 1000:1000 /opt/keycloak/data
              {{- end }}
              {{- if or .Values.persistence.themes.enabled .Values.devMode }}
              chown -R 1000:1000 /opt/keycloak/themes
              {{- end }}
              {{- if .Values.persistence.conf.enabled }}
              chown -R 1000:1000 /opt/keycloak/conf
              {{- end }}
              {{- if .Values.persistence.providers.enabled }}
              chown -R 1000:1000 /opt/keycloak/providers
              {{- end }}
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
          volumeMounts:
            {{- if or .Values.persistence.data.enabled .Values.devMode }}
            - name: data
              mountPath: /opt/keycloak/data
            {{- end }}
            {{- if or .Values.persistence.themes.enabled .Values.devMode }}
            - name: themes
              mountPath: /opt/keycloak/themes
            {{- end }}
            {{- if .Values.persistence.conf.enabled }}
            - name: conf
              mountPath: /opt/keycloak/conf
            {{- end }}
            {{- if .Values.persistence.providers.enabled }}
            - name: providers
              mountPath: /opt/keycloak/providers
            {{- end }}
        {{- end }}
      containers:
        - name: keycloak
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
          command:
            - "/opt/keycloak/bin/kc.sh"
          args:
            {{- if .Values.devMode }}
            - "start-dev"
            # Do not cache themes in dev mode to support hot-reloading
            - "--spi-theme-static-max-age=-1"
            - "--spi-theme-cache-themes=false"
            - "--spi-theme-cache-templates=false"
            {{- else }}
            - "start"
            {{- end }}
            # This will only import the realm if it does not exist
            - "--import-realm"
            # @lulaStart e7a920f8-e6e2-4a97-80a0-edda1fab0f8b
            - "--features=preview,fips"
            - "--fips-mode=strict"
            # @lulaEnd e7a920f8-e6e2-4a97-80a0-edda1fab0f8b
            - "--https-key-store-type=bcfks"
            - "--https-trust-store-type=bcfks"
            # NOTE: --truststore-paths is intentionally NOT set, and --truststore-kubernetes-enabled
            # is disabled. Whenever Keycloak's configureTruststore() has any truststore source
            # (an explicit path, a non-empty conf/truststores dir, or the auto-included Kubernetes
            # CA), it calls TruststoreBuilder.setSystemTruststore(), which always writes a PKCS12
            # truststore and forces javax.net.ssl.trustStoreType=PKCS12 (not FIPS-compliant). By
            # leaving all three empty, configureTruststore() returns early and leaves the JVM
            # system truststore alone. The generate-bcfks-truststore init container instead builds
            # a FIPS-compliant BCFKS truststore (including the Kubernetes CA) and we point Keycloak
            # at it via JAVA_OPTS_APPEND below.
            - "--truststore-kubernetes-enabled=false"
            - "--spi-authentication-sessions--map--auth-sessions-limit={{ .Values.realmConfig.maxInFlightLoginsPerUser | default 300 }}"
            - "--proxy-headers=xforwarded"
            - "--http-enabled=true"
            - "--hostname-strict=false"
            {{- if .Values.jsonLogFormat }}
            - "--log-console-output=json"
            {{- end }}
            {{- if gt (int .Values.httpRetry.maxRetries) 0 }}
            # HTTP retry configuration for outgoing requests
            - "--spi-connections-http-client-default-max-retries={{ .Values.httpRetry.maxRetries }}"
            - "--spi-connections-http-client-default-initial-backoff-millis={{ .Values.httpRetry.initialBackoffMillis }}"
            - "--spi-connections-http-client-default-backoff-multiplier={{ .Values.httpRetry.backoffMultiplier }}"
            {{- if not .Values.httpRetry.applyJitter }}
            - "--spi-connections-http-client-default-apply-jitter=false"
            {{- end }}
            {{- if .Values.httpRetry.applyJitter }}
            - "--spi-connections-http-client-default-jitter-factor={{ .Values.httpRetry.jitterFactor }}"
            {{- end }}
            {{- end }}
            {{- if .Values.disableVirtualThreads }}
            # Infinispan 16 introduced virtual threads, enabled by default. In constrained environments, such as Kubernetes with fewer than 4 vCPUs, it is highly recommended
            # to disable this feature to reduce the risk of deadlocks. See https://github.com/keycloak/keycloak/issues/48792 for more details.
            # The switch if officially supported, see https://infinispan.org/blog/2025/11/10/infinispan-16-0
            - "-Dorg.infinispan.threads.virtual=false"
            {{- end }}
          {{- with .Values.lifecycleHooks }}
          lifecycle:
          {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "keycloak.fullname" . }}-realm-env
          env:
          {{- if .Values.env }}
            {{- range .Values.env }}
              {{- if eq .name "JAVA_OPTS_APPEND" }}
                {{- fail "JAVA_OPTS_APPEND must not be set in .Values.env; the chart injects JAVA_OPTS_APPEND to configure the BCFKS system truststore and the FIPS JCE security override" }}
              {{- end }}
            {{- end }}
          {{- end }}
          {{- if .Values.env }}
            {{- tpl (toYaml .Values.env) . | nindent 12 }}
          {{- end }}
            # Point the JVM system truststore at the BCFKS truststore built by the
            # generate-bcfks-truststore init container. This is what outgoing TLS connections
            # (identity providers, LDAP, webhooks, etc.) use to validate peer certificates.
            # The FIPS JCE security override is appended for the cgr.dev FIPS image.
            - name: JAVA_OPTS_APPEND
              value: >-
                -Djavax.net.ssl.trustStore=/opt/keycloak/data/keycloak-truststore.bcfks
                -Djavax.net.ssl.trustStoreType=BCFKS
                -Djavax.net.ssl.trustStorePassword=keycloakchangeit
                {{- if contains "cgr.dev" .Values.image.repository }} -Djava.security.properties=/opt/keycloak/data/fips-sunjce.security{{- end }}
            # Common configuration
            - name: UDS_DOMAIN
              value: "{{ .Values.domain }}"
            - name: UDS_ADMIN_DOMAIN
              value: "{{ tpl .Values.adminDomain . }}"

            # Enable health and metrics endpoints
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_METRICS_ENABLED
              value: "true"

            # Ensure Keycloak is configured for running in container
            - name: KC_RUN_IN_CONTAINER
              value: "true"

            # @lulaStart e4ea044c-75fc-4acc-a552-8bba2aab1b12
            - name: KC_EVENT_METRICS_USER_ENABLED
              value: "true"
            # @lulaEnd e4ea044c-75fc-4acc-a552-8bba2aab1b12

            # Enable access log
            - name: QUARKUS_HTTP_ACCESS_LOG_ENABLED
              value: "true"
            # @lulaStart e4ea044c-75fc-4acc-a552-8bba2aab1b12
            {{- if .Values.detailedObservability.logging.enabled }}
            - name: KC_SPI_EVENTS_LISTENER__JBOSS_LOGGING__SUCCESS_LEVEL
              value: "info"
            - name: KC_SPI_EVENTS_LISTENER__JBOSS_LOGGING__SANITIZE
              value: "true"
            - name: KC_SPI_EVENTS_LISTENER__JBOSS_LOGGING__INCLUDE_REPRESENTATION
              value: "true"
            {{- end }}
            # @lulaEnd e4ea044c-75fc-4acc-a552-8bba2aab1b12
            # X509 configuration
            - name: KC_HTTPS_CLIENT_AUTH
              value: request

            # Escape Slashes in Group Names
            - name: KC_SPI_GROUP__JPA__ESCAPE_SLASHES_IN_GROUP_PATH
              value: "true"

            ## Activate the nginx provider
            - name: KC_SPI_X509CERT_LOOKUP__PROVIDER
              value: nginx
            # Set nginx provider header name
            - name: KC_SPI_X509CERT_LOOKUP__NGINX__SSL_CLIENT_CERT
              value: istio-mtls-client-certificate
            # Dumb value (not used in the nginx provider, but required by the SPI)
            - name: KC_SPI_X509CERT_LOOKUP__NGINX__SSL_CLIENT_CERT_CHAIN_PREFIX
              value: UNUSED
            # Below 3 settings are a workaround for https://github.com/keycloak/keycloak/issues/43589
            # After Keycloak 26.6.0 release, they should be removed
            - name: QUARKUS_SHUTDOWN_DELAY_ENABLED
              value: "true"
            - name: QUARKUS_SHUTDOWN_DELAY
              value: "5"
            - name: QUARKUS_SHUTDOWN_TIMEOUT
              value: "5"
          {{- if or .Values.devMode .Values.debugMode }}
            # Enable debug logs
            - name: KC_LOG_LEVEL
              value: DEBUG
            - name: QUARKUS_LOG_CATEGORY__ORG_APACHE_HTTP__LEVEL
              value: DEBUG
            - name: QUARKUS_HTTP_ACCESS_LOG_PATTERN
              value: long
            - name: QUARKUS_LOG_CATEGORY__ORG_KEYCLOAK_SERVICES_X509__LEVEL
              value: TRACE
            # Crypto information, primarily for FIPS debugging
            - name: QUARKUS_LOG_CATEGORY__ORG_KEYCLOAK_COMMON_CRYPTO__LEVEL
              value: TRACE
            - name: QUARKUS_LOG_CATEGORY__ORG_KEYCLOAK_CRYPTO__LEVEL
              value: TRACE
          {{- end }}
          {{- if .Values.devMode }}
            # https://github.com/keycloak/keycloak/issues/39046
            # Starting from 26.2.0, Keycloak doesn't use password for the internal H2 database.
            # This breaks upgrade scenarios, so we need to use the same password as in 26.1.x
            - name: KC_DB_USERNAME
              value: sa
            - name: KC_DB_PASSWORD
              value: password
          {{- end }}
          {{- if .Values.autoscaling.enabled }}
          {{- if ne (include "keycloak.postgresql.config" .) "true" -}}
              {{- fail "You must configure PostgreSQL when using Autoscaling (HA Mode)" -}}
          {{- end }}
            # Use Infinispan distributes caches
            - name: KC_CACHE
              value: ispn
            # Hints Infinispan to distribute data across machines in a Multi AZ environment
            - name: KC_SPI_CACHE_EMBEDDED__DEFAULT__MACHINE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
                  apiVersion: v1
            # Since we use sticky sessions managed by Istio, we assign our cookie ("keycloak-session"), and we do not use AUTH_SESSION_ID.
            # This means this option has to be always false.
            # See https://www.keycloak.org/server/reverseproxy#_enable_sticky_sessions
            - name: KC_SPI_STICKY_SESSION_ENCODER__INFINISPAN__SHOULD_ATTACH_ROUTE
              value: "false"
            # Rely on Istio mTLS encryption
            # See https://www.keycloak.org/server/caching#_running_inside_a_service_mesh
            - name: KC_CACHE_EMBEDDED_MTLS_ENABLED
              value: "false"
          {{- end }}
          {{- if eq (include "keycloak.postgresql.config" .) "true" }}
            # Postgres database configuration
            - name: KC_DB
              value: postgres
            # PostgreSQL configuration
            - name: KC_DB_URL_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.postgresql.host.secretName" . }}
                  key: {{ include "keycloak.postgresql.host.secretKey" . }}
            - name: KC_DB_URL_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.fullname" . }}-postgresql
                  key: port
            - name: KC_DB_URL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.fullname" . }}-postgresql
                  key: database
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.postgresql.username.secretName" . }}
                  key: {{ include "keycloak.postgresql.username.secretKey" . }}
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.postgresql.password.secretName" . }}
                  key: {{ include "keycloak.postgresql.password.secretKey" . }}
          {{- end }}
          {{- if .Values.insecureAdminPasswordGeneration.enabled }}
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.fullname" . }}-admin-password
                  key: username
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.fullname" . }}-admin-password
                  key: password
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: tcp
              containerPort: 7800
              protocol: TCP
            - name: tcp-fd
              containerPort: 57800
              protocol: TCP
            - name: metrics
              containerPort: 9000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health/live
              port: metrics
              scheme: HTTP
            failureThreshold: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: metrics
              scheme: HTTP
            failureThreshold: 3
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health/started
              port: metrics
              scheme: HTTP
            failureThreshold: 600
            periodSeconds: 1
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: providers
              mountPath: /opt/keycloak/providers
            - name: data
              mountPath: /opt/keycloak/data
            - name: themes
              mountPath: /opt/keycloak/themes
            - name: conf
              mountPath: /opt/keycloak/conf
              readOnly: true
            - name: client-secrets
              mountPath: /var/run/secrets/uds/client-secrets
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if contains "cgr.dev" .Values.image.repository }}
            - name: fips-jce-security
              mountPath: /opt/keycloak/data/fips-sunjce.security
              subPath: fips-sunjce.security
              readOnly: true
            {{- end }}
      enableServiceLinks: {{ .Values.enableServiceLinks }}
      restartPolicy: {{ .Values.restartPolicy }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- tpl . $ | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- tpl . $ | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      volumes:
        - name: client-secrets
          secret:
            secretName: {{ include "keycloak.fullname" . }}-client-secrets
        - name: providers
          {{- if .Values.persistence.providers.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "keycloak.fullname" . }}-providers
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: conf
          {{- if .Values.persistence.conf.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "keycloak.fullname" . }}-conf
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: data
          {{- if or .Values.persistence.data.enabled .Values.devMode }}
          # devMode enables this PVC by default to preserve legacy behavior
          persistentVolumeClaim:
            claimName: {{ include "keycloak.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: themes
          {{- if or .Values.persistence.themes.enabled .Values.devMode }}
          # devMode enables this PVC by default to preserve legacy behavior
          persistentVolumeClaim:
            claimName: {{ include "keycloak.fullname" . }}-themes
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.themeCustomizations }}
        - name: theme-overrides
          projected:
            sources:
              {{- if and .Values.themeCustomizations.resources .Values.themeCustomizations.resources.images }}
              {{- range $image := .Values.themeCustomizations.resources.images }}
              {{- if $image.configmap.name }}
              - configMap:
                  name: {{ $image.configmap.name }}
                  items:
                    - key: {{ $image.name }}
                      path: {{ $image.name }}
              {{- end }}
              {{- end }}
              {{- end }}
              {{- if and .Values.themeCustomizations.termsAndConditions .Values.themeCustomizations.termsAndConditions.text }}
              {{- if .Values.themeCustomizations.termsAndConditions.text.configmap }}
              {{- with .Values.themeCustomizations.termsAndConditions.text.configmap }}
              - configMap:
                  name: {{ .name }}
                  items:
                    - key: {{ .key }}
                      path: tc.txt
              {{- end }}
              {{- else if .Values.themeCustomizations.termsAndConditions.text.inline }}
              - configMap:
                  name: {{ include "keycloak.fullname" . }}-terms-and-conditions
                  items:
                    - key: tc_text
                      path: tc.txt
              {{- end }}
              {{- end }}
        {{- end }}
        {{- if contains "cgr.dev" .Values.image.repository }}
        - name: fips-jce-security
          configMap:
            name: {{ include "keycloak.fullname" . }}-fips-jce-security
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
