apiVersion: v1
kind: Secret
metadata:
  name: {{ include "keycloak.fullname" . }}-truststore-password
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
type: Opaque
data:
  password: {{ "keycloakchangeit" | b64enc | quote }}
