# Default Zarf values for the UDS Core Istio source package. Keys are namespaced by component
# then chart (component.chart). Every mapped chart must have its component.chart key present here
# (an absent sourcePath is a hard deploy error). An empty {} is a no-op. See excludePaths in
# common/zarf.yaml and zarf.yaml for blocked paths.
domain: "###ZARF_VAR_DOMAIN###"
adminDomain: ""

istio-controlplane:
  base: {}
  istiod: {}
  uds-global-istio-config: {}
  cni: {}
  ztunnel: {}

istio-admin-gateway:
  gateway: {}
  uds-istio-config: {}

istio-tenant-gateway:
  gateway: {}
  uds-istio-config: {}

istio-passthrough-gateway:
  gateway: {}
  uds-istio-config: {}

istio-egress-ambient:
  uds-istio-egress-config: {}

istio-egress-gateway:
  gateway: {}
