name: passthrough
# Explicit values take precedence, then package variables, then admin.<domain>.
domain: '{{default .Variables.DOMAIN .Values.global.domain}}'
adminDomain: '{{default (default (printf "admin.%s" (default .Variables.DOMAIN .Values.global.domain)) .Variables.ADMIN_DOMAIN) .Values.global.adminDomain}}'

tls:
  servers:
    passthrough:
      mode: PASSTHROUGH
