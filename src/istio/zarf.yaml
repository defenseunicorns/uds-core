apiVersion: zarf.dev/v1beta1
kind: ZarfPackageConfig
metadata:
  name: istio
components:
  - name: istio-controlplane
    import:
      local:
        - path: ./flavors/istio-controlplane-upstream.yaml
        - path: ./flavors/istio-controlplane-registry1.yaml
        - path: ./flavors/istio-controlplane-unicorn.yaml

  - name: gateway-api-crds
    import:
      local:
        - path: ./common/gateway-api-crds.yaml

  - name: istio-admin-gateway
    import:
      local:
        - path: ./istio-admin-gateway.yaml

  - name: istio-tenant-gateway
    import:
      local:
        - path: ./istio-tenant-gateway.yaml

  - name: istio-passthrough-gateway
    import:
      local:
        - path: ./istio-passthrough-gateway.yaml

  - name: istio-egress-ambient
    import:
      local:
        - path: ./istio-egress-ambient.yaml

  - name: istio-egress-gateway
    import:
      local:
        - path: ./istio-egress-gateway.yaml
