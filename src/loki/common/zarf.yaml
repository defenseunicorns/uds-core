kind: ZarfPackageConfig
metadata:
  name: uds-core-loki-common
  description: "UDS Core Loki Common"

components:
  - name: loki
    required: true
    charts:
      - name: uds-loki-config
        namespace: loki
        version: 0.2.0
        localPath: ../chart
      - name: loki
        url: https://grafana-community.github.io/helm-charts/
        version: 17.1.7
        namespace: loki
        valuesFiles:
          - ../values/values.yaml
        values:
          - sourcePath: .loki.loki.storage
            targetPath: .loki.storage
          - sourcePath: .loki.write.replicas
            targetPath: .write.replicas
          - sourcePath: .loki.read.replicas
            targetPath: .read.replicas
          - sourcePath: .loki.backend.replicas
            targetPath: .backend.replicas
