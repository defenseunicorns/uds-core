kind: ZarfPackageConfig
metadata:
  name: uds-core-loki-common
  description: "UDS Core Loki Common"

components:
  - name: loki
    required: true
    charts:
      - name: uds-loki-config
        namespace: loki
        version: 0.2.0
        localPath: ../chart
      - name: loki
        url: https://grafana-community.github.io/helm-charts/
        version: 18.4.0
        namespace: loki
        valuesFiles:
          - ../values/values.yaml
        # auth_enabled, deploymentMode, and minio are excluded to protect the loki security
        # model, scalable topology, and to prevent enabling the built-in minio instance.
        values:
          - sourcePath: .loki
            targetPath: .
            excludePaths:
              - .loki.loki.auth_enabled
              - .loki.deploymentMode
              - .loki.minio
