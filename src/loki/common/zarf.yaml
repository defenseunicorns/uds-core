kind: ZarfPackageConfig
metadata:
  name: uds-core-loki-common
  description: "UDS Core Loki Common"

components:
  - name: loki
    required: true
    charts:
      - name: uds-loki-config
        namespace: loki
        version: 0.2.0
        localPath: ../chart
        # UDS-authored config chart, exposed broadly. It carries no image or security-context
        # values, so all keys stay settable.
        values:
          - sourcePath: .loki.uds-loki-config
            targetPath: .
      - name: loki
        url: https://grafana-community.github.io/helm-charts/
        version: 18.4.4
        namespace: loki
        valuesFiles:
          - ../values/values.yaml
        # Loki is an upstream chart exposed broadly. Exclude image references (to prevent pulling
        # unauthorized images) and security contexts (to prevent privilege escalation). auth_enabled,
        # deploymentMode, and minio are excluded to protect the loki security model, scalable
        # topology, and to prevent enabling the built-in minio instance.
        values:
          - sourcePath: .loki.loki
            targetPath: .
            excludePaths:
              - .loki.loki.loki.auth_enabled
              - .loki.loki.deploymentMode
              - .loki.loki.minio
              - .loki.loki.backend.image
              - .loki.loki.bloomBuilder.image
              - .loki.loki.bloomGateway.image
              - .loki.loki.bloomPlanner.image
              - .loki.loki.compactor.image
              - .loki.loki.defaults.statefulSetRecreateJob.image
              - .loki.loki.distributor.image
              - .loki.loki.gateway.image
              - .loki.loki.gateway.metrics.image
              - .loki.loki.global.image
              - .loki.loki.global.imageRegistry
              - .loki.loki.indexGateway.image
              - .loki.loki.ingester.image
              - .loki.loki.loki.image
              - .loki.loki.lokiCanary.image
              - .loki.loki.memcached.image
              - .loki.loki.memcachedExporter.image
              - .loki.loki.overridesExporter.image
              - .loki.loki.patternIngester.image
              - .loki.loki.querier.image
              - .loki.loki.queryFrontend.image
              - .loki.loki.queryScheduler.image
              - .loki.loki.read.image
              - .loki.loki.ruler.image
              - .loki.loki.sidecar.image
              - .loki.loki.singleBinary.image
              - .loki.loki.tableManager.image
              - .loki.loki.test.image
              - .loki.loki.write.image
              - .loki.loki.defaults.containerSecurityContext
              - .loki.loki.defaults.podSecurityContext
              - .loki.loki.gateway.containerSecurityContext
              - .loki.loki.gateway.metrics.containerSecurityContext
              - .loki.loki.gateway.podSecurityContext
              - .loki.loki.loki.containerSecurityContext
              - .loki.loki.loki.podSecurityContext
              - .loki.loki.lokiCanary.containerSecurityContext
              - .loki.loki.lokiCanary.podSecurityContext
              - .loki.loki.memcached.containerSecurityContext
              - .loki.loki.memcached.podSecurityContext
              - .loki.loki.memcachedExporter.containerSecurityContext
              - .loki.loki.rollout_operator.podSecurityContext
              - .loki.loki.rollout_operator.securityContext
              - .loki.loki.sidecar.securityContext
