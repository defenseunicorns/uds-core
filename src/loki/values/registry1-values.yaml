loki:
  image:
    registry: registry1.dso.mil
    repository: ironbank/opensource/grafana/loki
    tag: 3.7.3
  podSecurityContext:
    fsGroup: 10001
    runAsGroup: 10001
    runAsNonRoot: true
    runAsUser: 10001
  # -- The SecurityContext for Loki containers
  containerSecurityContext:
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
    allowPrivilegeEscalation: false
gateway:
  image:
    registry: registry1.dso.mil
    repository: ironbank/opensource/nginx/nginx-alpine
    tag: 1.30.3
memcached:
  image:
    registry: registry1.dso.mil
    repository: ironbank/opensource/memcached/memcached
    tag: 1.6.45

sidecar:
  image:
    registry: registry1.dso.mil
    repository: ironbank/kiwigrid/k8s-sidecar
    tag: 2.8.1
