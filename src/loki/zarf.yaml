kind: ZarfPackageConfig
metadata:
  # @lulaStart 21e01692-d68c-42a1-86ea-e2ce744e1736
  # @lulaState d2a68ac7-ae8f-4be9-a5cf-ba368aa99ba8
  # @lulaStart ac7739bd-39bd-407b-9dcc-2e501062fe7f
  name: uds-core-loki
  # @lulaEnd ac7739bd-39bd-407b-9dcc-2e501062fe7f
  # @lulaEnd d2a68ac7-ae8f-4be9-a5cf-ba368aa99ba8
  # @lulaEnd 21e01692-d68c-42a1-86ea-e2ce744e1736
  description: "UDS Core Loki"

components:
  - name: loki
    required: true
    description: "Install Loki using upstream (docker) images"
    only:
      flavor: "upstream"
    import:
      path: common
    charts:
      - name: loki
        valuesFiles:
          - ./values/upstream-values.yaml
    images:
      - docker.io/grafana/loki:3.7.3
      - docker.io/nginxinc/nginx-unprivileged:1.31-alpine
      - docker.io/memcached:1.6.42-alpine
      - docker.io/kiwigrid/k8s-sidecar:2.8.0

  - name: loki
    required: true
    description: "Install Loki using registry1 images"
    only:
      flavor: "registry1"
    import:
      path: common
    charts:
      - name: loki
        valuesFiles:
          - ./values/registry1-values.yaml
    images:
      - registry1.dso.mil/ironbank/opensource/grafana/loki:3.7.3
      - registry1.dso.mil/ironbank/opensource/nginx/nginx-alpine:1.30.3
      - registry1.dso.mil/ironbank/opensource/memcached/memcached:1.6.42
      - registry1.dso.mil/ironbank/kiwigrid/k8s-sidecar:2.8.0

  - name: loki
    required: true
    description: "Install Loki using Chainguard images"
    only:
      flavor: "unicorn"
    import:
      path: common
    charts:
      - name: loki
        valuesFiles:
          - ./values/unicorn-values.yaml
    images:
      - cgr.dev/defenseunicorns.com/loki-fips:v3.7.3
      - cgr.dev/defenseunicorns.com/nginx-fips:v1.31.2
      - cgr.dev/defenseunicorns.com/memcached-fips:v1.6.42
      - cgr.dev/defenseunicorns.com/k8s-sidecar-fips:v2.8.0
