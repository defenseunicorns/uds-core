tasks:
  - name: gen-crds
    description: |
      Generate raw Go types from CRD manifests into .generated/ for developer reference.
      Output requires manual curation before incorporating into api/uds/v1alpha1/package.go
      (add package declaration, move imports to top, add TypeMeta/ObjectMeta wrappers, etc.)
    actions:
      - description: Generate Package types from CRD YAML into scratch directory
        cmd: npx kubernetes-fluent-client@3.11.6 crd src/pepr/uds-cluster-crds/templates/packages.uds.dev.yaml -l go src/go-controller/.generated/
      - description: Generate ClusterConfig types from CRD YAML into scratch directory
        cmd: npx kubernetes-fluent-client@3.11.6 crd src/pepr/uds-cluster-crds/templates/clusterconfig.uds.dev.yaml -l go src/go-controller/.generated/

  - name: validate
    actions:
      - description: Wait for uds-controller pod(s) to be ready
        wait:
          cluster:
            kind: Deployment
            name: uds-controller
            namespace: uds-system

  - name: update-pepr
    description: Apply dev-flags.env to the Pepr watcher deployment and cycle the pod
    actions:
      - description: "Set feature flag env vars on the Pepr watcher and restart"
        cmd: |
          grep -v '^#' src/go-controller/dev-flags.env | grep -v '^[[:space:]]*$' | \
            xargs uds zarf tools kubectl set env deployment/pepr-uds-core-watcher -n pepr-system
          uds zarf tools kubectl rollout restart deployment/pepr-uds-core-watcher -n pepr-system
          uds zarf tools kubectl rollout status deployment/pepr-uds-core-watcher -n pepr-system

  - name: update-controller
    description: Updates controller to latest code on an already running `dev-setup`
    actions:
      - description: "Build and load the Go controller image"
        cmd: |
          docker build -t uds-core-controller:dev src/go-controller/
          k3d image import uds-core-controller:dev -c uds

      - description: "Deploy the Go controller"
        cmd: |
          uds zarf tools kubectl apply -f src/go-controller/manifests/namespace.yaml
          uds zarf tools kubectl apply -f src/go-controller/manifests/rbac.yaml
          uds zarf tools kubectl apply -f src/go-controller/manifests/deployment.yaml
          uds zarf tools kubectl rollout restart deployment/uds-controller -n uds-system
          uds zarf tools kubectl rollout status deployment/uds-controller -n uds-system
