kind: ZarfPackageConfig
metadata:
  name: uds-core-controller
  description: "UDS Core Go Controller"

components:
  - name: uds-controller
    required: true
    charts:
      - name: uds-controller
        namespace: uds-system
        version: 0.1.0
        localPath: chart
    images:
      - ghcr.io/defenseunicorns/uds-core/controller:0.1.0
    actions:
      onDeploy:
        after:
          - description: "Ensure Istio Ambient is enabled for controller"
            cmd: |
              echo "Setting Ambient mode for uds-system..."
              ./zarf tools kubectl label namespace uds-system "istio.io/dataplane-mode"="ambient" --overwrite

              echo "Disabling istio-injection on uds-system..."
              ./zarf tools kubectl label namespace uds-system istio-injection=disabled --overwrite
