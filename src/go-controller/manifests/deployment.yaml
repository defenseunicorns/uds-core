apiVersion: apps/v1
kind: Deployment
metadata:
  name: uds-controller
  namespace: uds-system
  labels:
    app: uds-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uds-controller
  template:
    metadata:
      labels:
        app: uds-controller
        zarf.dev/agent: ignore
    spec:
      serviceAccountName: uds-controller
      containers:
        - name: controller
          image: uds-core-controller:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: UDS_OPERATOR_NETWORK_POLICIES_ENABLED
              value: "false"
            - name: UDS_OPERATOR_AUTHORIZATION_POLICIES_ENABLED
              value: "false"
            - name: UDS_OPERATOR_ISTIO_INJECTION_ENABLED
              value: "false"
            - name: UDS_OPERATOR_ISTIO_INGRESS_ENABLED
              value: "false"
            - name: UDS_OPERATOR_ISTIO_EGRESS_ENABLED
              value: "false"
            - name: UDS_OPERATOR_SSO_ENABLED
              value: "false"
            - name: UDS_OPERATOR_POD_MONITORS_ENABLED
              value: "false"
            - name: UDS_OPERATOR_SERVICE_MONITORS_ENABLED
              value: "false"
            - name: UDS_OPERATOR_UPTIME_PROBES_ENABLED
              value: "false"
            - name: UDS_OPERATOR_CA_BUNDLE_ENABLED
              value: "false"
          ports:
            - name: webhook
              containerPort: 9443
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
