apiVersion: v1
kind: ServiceAccount
metadata:
  name: uds-controller
  namespace: uds-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: uds-controller
rules:
  # Configmaps and Secrets
  - apiGroups:
      - ""
    resources:
      - configmaps
      - secrets
    verbs:
      - create
      - delete
      - get
      - list
      - update
      - patch
      - watch

  # Endpoints and events
  - apiGroups:
      - ""
    resources:
      - endpoints
      - events
    verbs:
      - create
      - delete
      - get
      - list
      - patch

  # Namespaces
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - create
      - get
      - list
      - patch

  # Services
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - get
      - list
      - patch
      - watch

  # Pods
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - delete
      - get
      - list
      - patch

  # Pod eviction subresource
  - apiGroups:
      - ""
    resources:
      - pods/eviction
    verbs:
      - create

  # Nodes
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
      - watch

  # Discovery API resources
  - apiGroups:
      - discovery.k8s.io
    resources:
      - endpointslices
    verbs:
      - get
      - list
      - watch

  # Pepr store resources
  - apiGroups:
      - pepr.dev
    resources:
      - peprstores
    verbs:
      - create
      - get
      - list
      - patch
      - watch

  # Apps API resources
  - apiGroups:
      - apps
    resources:
      - daemonsets
      - deployments
      - replicasets
      - statefulsets
    verbs:
      - get
      - list
      - patch

  # Networking API resources
  - apiGroups:
      - networking.k8s.io
    resources:
      - networkpolicies
    verbs:
      - create
      - delete
      - get
      - list
      - patch

  # Gateway API resources
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - gateways
    verbs:
      - create
      - delete
      - get
      - list
      - patch

  # Istio security resources
  - apiGroups:
      - security.istio.io
    resources:
      - authorizationpolicies
      - requestauthentications
    verbs:
      - create
      - delete
      - get
      - list
      - patch

  # Istio networking resources
  - apiGroups:
      - networking.istio.io
    resources:
      - destinationrules
      - gateways
      - serviceentries
      - sidecars
      - virtualservices
    verbs:
      - create
      - delete
      - get
      - list
      - patch

  # Prometheus monitoring resources
  - apiGroups:
      - monitoring.coreos.com
    resources:
      - podmonitors
      - servicemonitors
      - probes
    verbs:
      - create
      - delete
      - get
      - list
      - patch

  # UDS custom resources
  - apiGroups:
      - uds.dev
    resources:
      - exemptions
      - packages
      - packages/status
      - clusterconfig
      - clusterconfig/status
    verbs:
      - get
      - list
      - patch
      - watch

  # CRD management
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - create
      - get
      - list
      - patch

  # ValidatingWebhookConfiguration (for patching caBundle)
  - apiGroups:
      - admissionregistration.k8s.io
    resources:
      - validatingwebhookconfigurations
    resourceNames:
      - uds-controller-clusterconfig
    verbs:
      - get
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: uds-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: uds-controller
subjects:
  - kind: ServiceAccount
    name: uds-controller
    namespace: uds-system
