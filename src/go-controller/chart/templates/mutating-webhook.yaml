apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: uds-controller-waypoint
  labels:
    app: uds-controller
webhooks:
  - name: pods.waypoint.uds.dev
    admissionReviewVersions:
      - v1
    sideEffects: None
    failurePolicy: Ignore
    matchPolicy: Equivalent
    namespaceSelector:
      matchExpressions:
        - key: istio.io/dataplane-mode
          operator: In
          values:
            - ambient
    clientConfig:
      service:
        name: uds-controller
        namespace: {{ .Release.Namespace }}
        path: /mutate-pod-waypoint
        port: 443
      caBundle: ""
    rules:
      - apiGroups:
          - ""
        apiVersions:
          - v1
        resources:
          - pods
        operations:
          - CREATE
        scope: Namespaced
  - name: services.waypoint.uds.dev
    admissionReviewVersions:
      - v1
    sideEffects: None
    failurePolicy: Ignore
    matchPolicy: Equivalent
    namespaceSelector:
      matchExpressions:
        - key: istio.io/dataplane-mode
          operator: In
          values:
            - ambient
    clientConfig:
      service:
        name: uds-controller
        namespace: {{ .Release.Namespace }}
        path: /mutate-service-waypoint
        port: 443
      caBundle: ""
    rules:
      - apiGroups:
          - ""
        apiVersions:
          - v1
        resources:
          - services
        operations:
          - CREATE
          - UPDATE
        scope: Namespaced
