kind: ZarfPackageConfig
metadata:
  name: uds-core-authservice-common
  description: "UDS Core Authservice Common"
  url: https://github.com/istio-ecosystem/authservice

components:
  - name: authservice
    required: true
    charts:
      - name: authservice
        localPath: ../chart
        version: 1.0.1
        namespace: authservice
        values:
          - sourcePath: .authservice.replicaCount
            targetPath: .replicaCount
          - sourcePath: .authservice.resources
            targetPath: .resources
