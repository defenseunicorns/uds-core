{{- if .Capabilities.APIVersions.Has "monitoring.coreos.com/v1" }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: uds-authservice-uptime
  namespace: {{ .Release.Namespace }}
spec:
  groups:
    - name: uds-authservice-uptime
      rules:
        - record: uds:authservice:up
          labels:
            uds_layer: identity-authorization
            uds_component: authservice
          expr: |
            (
              clamp_max(kube_deployment_status_replicas_available{deployment="authservice", namespace="authservice"}, 1)
              or on()
              (absent(kube_deployment_status_replicas_available{deployment="authservice", namespace="authservice"}) * 0)
            )
            * on() group_left()
            kube_state_metrics:up
{{- end }}
