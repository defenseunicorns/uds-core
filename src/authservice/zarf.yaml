kind: ZarfPackageConfig
metadata:
  # @lulaStart dd88d780-5e5f-49dd-9104-3a92d33a190c
  name: uds-core-authservice
  # @lulaEnd dd88d780-5e5f-49dd-9104-3a92d33a190c
  description: "UDS Core Authservice"
  url: https://github.com/istio-ecosystem/authservice

variables:
  - name: AUTHSERVICE_REDIS_URI
    description: "UDS Authservice Redis URI"
    default: ""

values:
  files:
    - zarf-values.yaml

components:
  - name: authservice
    required: true
    only:
      flavor: upstream
    import:
      path: common
    charts:
      - name: authservice
        valuesFiles:
          - values/upstream-values.yaml
    images:
      - ttl.sh/authservice-sentinel-ed882ced:24h

  - name: authservice
    required: true
    only:
      flavor: registry1
    import:
      path: common
    charts:
      - name: authservice
        valuesFiles:
          - values/registry1-values.yaml
    images:
      - registry1.dso.mil/ironbank/istio-ecosystem/authservice:1.1.5-fips

  - name: authservice
    required: true
    only:
      flavor: unicorn
    import:
      path: common
    charts:
      - name: authservice
        valuesFiles:
          - values/unicorn-values.yaml
    images:
      - cgr.dev/defenseunicorns.com/authservice-fips:1.1.5
