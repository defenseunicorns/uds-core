kind: ZarfPackageConfig
metadata:
  # @lulaStart d3f0db2b-460d-453e-8f0f-121f29ac56a2
  # @lulaStart d2a68ac7-ae8f-4be9-a5cf-ba368aa99ba8
  name: uds-core-grafana
  # @lulaEnd d2a68ac7-ae8f-4be9-a5cf-ba368aa99ba8
  # @lulaEnd d3f0db2b-460d-453e-8f0f-121f29ac56a2
  description: "UDS Core Grafana"
  url: https://grafana.com/grafana

variables:
  - name: DOMAIN
    description: "Cluster domain"
    default: "uds.dev"

  - name: ADMIN_DOMAIN
    description: "Domain for admin services, defaults to `admin.DOMAIN`"

components:
  - name: grafana
    required: true
    only:
      flavor: upstream
    import:
      path: common
    charts:
      - name: grafana
        valuesFiles:
          - values/upstream-values.yaml
    images:
      - docker.io/grafana/grafana:13.0.1
      - docker.io/curlimages/curl:8.20.0
      - docker.io/library/busybox:1.37.0
      - ghcr.io/kiwigrid/k8s-sidecar:2.7.3

  - name: grafana
    required: true
    only:
      flavor: registry1
    import:
      path: common
    charts:
      - name: grafana
        valuesFiles:
          - values/registry1-values.yaml
    images:
      - registry1.dso.mil/ironbank/opensource/grafana/grafana:13.0.1
      - registry1.dso.mil/ironbank/redhat/ubi/ubi9-minimal:9.8
      - registry1.dso.mil/ironbank/kiwigrid/k8s-sidecar:2.7.1

  - name: grafana
    required: true
    only:
      flavor: unicorn
    import:
      path: common
    charts:
      - name: grafana
        valuesFiles:
          - values/unicorn-values.yaml
    images:
      - cgr.dev/defenseunicorns.com/grafana-fips:v13.0.1
      - cgr.dev/defenseunicorns.com/busybox-fips:1.37.0
      - cgr.dev/defenseunicorns.com/curl-fips:v8.20.0
      - cgr.dev/defenseunicorns.com/k8s-sidecar-fips:v2.7.3
