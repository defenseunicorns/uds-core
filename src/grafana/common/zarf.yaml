kind: ZarfPackageConfig
metadata:
  name: uds-core-grafana-common
  description: "UDS Core Grafana Common"
  url: https://grafana.com/grafana

components:
  - name: grafana
    required: true
    charts:
      - name: uds-grafana-config
        namespace: grafana
        version: 0.1.0
        localPath: ../chart
        valuesFiles:
          - ../chart/values.yaml
        # UDS-authored config chart, exposed broadly. Its nested adminDomain is excluded so the
        # top-level domain and adminDomain values below control Grafana's admin URLs.
        values:
          - sourcePath: .grafana.uds-grafana-config
            targetPath: .
            excludePaths:
              - .grafana.uds-grafana-config.adminDomain
          - sourcePath: .domain
            targetPath: .domain
          - sourcePath: .adminDomain
            targetPath: .udsAdminDomain
      - name: grafana
        url: https://grafana-community.github.io/helm-charts
        version: 12.3.3
        namespace: grafana
        valuesFiles:
          - ../values/values.yaml
        # sidecar is excluded because UDS configures the provisioning sidecars that wire
        # Loki and Prometheus datasources; overriding it breaks datasource connectivity.
        # Image references and registries are excluded to prevent pulling unauthorized
        # images, and security contexts to prevent privilege escalation.
        values:
          - sourcePath: .grafana.grafana
            targetPath: .
            excludePaths:
              - .grafana.grafana.sidecar
              - .grafana.grafana.image
              - .grafana.grafana.initChownData.image
              - .grafana.grafana.downloadDashboardsImage
              - .grafana.grafana.global.imageRegistry
              - .grafana.grafana.securityContext
              - .grafana.grafana.containerSecurityContext
              - .grafana.grafana.initChownData.securityContext
              - .grafana.grafana.downloadDashboards.securityContext
              - .grafana.grafana.imageRenderer.image
              - .grafana.grafana.imageRenderer.securityContext
              - .grafana.grafana.imageRenderer.containerSecurityContext
              - .grafana.grafana.testFramework.image
              - .grafana.grafana.testFramework.securityContext
              - .grafana.grafana.testFramework.containerSecurityContext
          - sourcePath: .domain
            targetPath: .domain
          - sourcePath: .adminDomain
            targetPath: .udsAdminDomain
