kind: ZarfPackageConfig
metadata:
  name: uds-core-grafana-common
  description: "UDS Core Grafana Common"
  url: https://grafana.com/grafana

components:
  - name: grafana
    required: true
    charts:
      - name: uds-grafana-config
        namespace: grafana
        version: 0.1.0
        localPath: ../chart
        valuesFiles:
          - ../chart/values.yaml
        # UDS-authored config chart, exposed broadly. domain/adminDomain are excluded so they
        # stay driven by Zarf variable templating (###ZARF_VAR###); sso is excluded because the
        # Grafana OAuth client is wired to Keycloak by UDS and a careless override breaks auth.
        values:
          - sourcePath: .uds-grafana-config
            targetPath: .
            excludePaths:
              - .uds-grafana-config.domain
              - .uds-grafana-config.adminDomain
              - .uds-grafana-config.sso
      - name: grafana
        url: https://grafana-community.github.io/helm-charts
        version: 12.3.3
        namespace: grafana
        valuesFiles:
          - ../values/values.yaml
        # sidecar is excluded because UDS configures the provisioning sidecars that wire
        # Loki and Prometheus datasources; overriding it breaks datasource connectivity.
        values:
          - sourcePath: .grafana
            targetPath: .
            excludePaths:
              - .grafana.sidecar
