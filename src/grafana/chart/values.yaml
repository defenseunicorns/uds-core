domain: '{{if and .Values.domain (ne .Values.domain (printf "###ZARF_VAR_%s###" "DOMAIN"))}}{{.Values.domain}}{{else}}{{.Variables.DOMAIN}}{{end}}'
adminDomain: '{{if and .Values.adminDomain (ne .Values.adminDomain (printf "###ZARF_VAR_%s###" "ADMIN_DOMAIN"))}}{{.Values.adminDomain}}{{else if and .Variables.ADMIN_DOMAIN (ne .Variables.ADMIN_DOMAIN (printf "###ZARF_VAR_%s###" "ADMIN_DOMAIN"))}}{{.Variables.ADMIN_DOMAIN}}{{else}}admin.{{if and .Values.domain (ne .Values.domain (printf "###ZARF_VAR_%s###" "DOMAIN"))}}{{.Values.domain}}{{else}}{{.Variables.DOMAIN}}{{end}}{{end}}'

# optional extra datasources to be added to configmap
extraDatasources: []

# Stores Grafana's metadata, including dashboards, data sources, organizations, alerts, and other configurations. Required for HA mode.
postgresql:
  # The hostname of the external postgresql server ( does not include the port )
  host: ""
  # The name of the postgresql database Grafana will connect to.
  database: ""
  # The username used for authenticating to the external postgresql.
  user: ""
  # The password used for authenticating to the external postgresql.
  password: ""
  # SSL mode for the postgresql connection. Set to 'disable' if SSL is not required.
  ssl_mode: require
  # Port the postgresql is listening on
  port: 5432
  # Egress CIDR for external Postgres
  egressCidr: ""
  # Configure internal postgresql deployment
  internal:
    enabled: false
    remoteSelector: {}
    remoteNamespace: ""

sso:
  # Groups that are allowed to use the Keycloak Client for Grafana
  groups:
    - "/UDS Core/Admin"
    - "/UDS Core/Auditor"

# Support for custom `network.allow` entries on the Package CR, useful for extra datasources
additionalNetworkAllow: []
# ref: https://docs.defenseunicorns.com/core/reference/operator--crds/packages-v1alpha1-cr/#allow
#   - direction: Egress
#     selector:
#       app.kubernetes.io/name: grafana
#     remoteNamespace: thanos
#     remoteSelector:
#       app: thanos
#     description: "Thanos Query"
#     port: 9090

# Enable default uptime monitoring probes for Grafana endpoints
uptime:
  enabled: true
