# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json

suite: Grafana SSO Groups Configuration
set:
  domain: "example.com"
  adminDomain: "admin.example.com"
  sso:
    groups:
      - "/UDS Core/Admin"
      - "/UDS Core/Auditor"
      - "/UDS Core/Test"
templates:
  - uds-package.yaml
tests:
  - it: should correctly include all groups in the groups.anyOf list
    template: uds-package.yaml
    asserts:
      - isKind:
          of: Package
      - equal:
          path: spec.sso[0].groups.anyOf
          value:
            - "/UDS Core/Admin"
            - "/UDS Core/Auditor"
            - "/UDS Core/Test"

  - it: should render path-routed redirect URIs and admin route
    set:
      pathRouting: true
      contextPath: /bar
      adminContextPath: /admin
    template: uds-package.yaml
    asserts:
      - equal:
          path: spec.sso[0].redirectUris
          value:
            - https://admin.example.com/bar/admin/grafana/login/generic_oauth
            - https://admin.example.com/bar/admin/grafana/login
      - equal:
          path: spec.network.expose[0].advancedHTTP.match[0].uri.prefix
          value: /bar/admin/grafana
      - notExists:
          path: spec.network.expose[0].advancedHTTP.rewrite
