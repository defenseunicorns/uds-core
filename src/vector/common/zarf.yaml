kind: ZarfPackageConfig
metadata:
  name: uds-core-vector-common
  description: "UDS Core Vector Common"
  url: "https://vector.dev/"

components:
  - name: vector
    required: true
    charts:
      - name: uds-vector-config
        namespace: vector
        version: 0.1.0
        localPath: ../chart
        values:
          - sourcePath: .vector.uds-vector-config
            targetPath: .
      - name: vector
        url: https://helm.vector.dev
        version: 0.56.0
        namespace: vector
        gitPath: charts/vector
        valuesFiles:
          - ../values/values.yaml
        values:
          - sourcePath: .vector.vector
            targetPath: .
            excludePaths:
              - .vector.vector.image
              - .vector.vector.podSecurityContext
              - .vector.vector.securityContext
              - .vector.vector.haproxy.image
              - .vector.vector.haproxy.podSecurityContext
              - .vector.vector.haproxy.securityContext
