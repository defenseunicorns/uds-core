{{- if .Capabilities.APIVersions.Has "monitoring.coreos.com/v1" }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: uds-vector-uptime
  namespace: {{ .Release.Namespace }}
  labels:
    prometheus: kube-prometheus-stack-prometheus
spec:
  groups:
    - name: uds-logging-vector-uptime
      rules:
        - record: uds:vector:up
          labels:
            uds_layer: logging
            uds_component: vector
          expr: kube_daemonset_status_number_ready{daemonset="vector", namespace="vector"} >= bool kube_daemonset_status_desired_number_scheduled{daemonset="vector", namespace="vector"}
{{- end }}
