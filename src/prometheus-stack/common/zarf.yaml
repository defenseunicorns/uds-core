kind: ZarfPackageConfig
metadata:
  name: uds-core-prometheus-stack-common
  description: "UDS Core Prometheus-Stack Common"

components:
  - name: kube-prometheus-stack
    required: true
    description: "Install kube-prometheus-stack using the helm chart https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack"
    charts:
      - name: uds-prometheus-config
        namespace: monitoring
        version: 0.1.0
        localPath: ../chart
        # UDS-authored config chart, exposed broadly. It carries no image or security-context
        # values, so all keys stay settable.
        values:
          - sourcePath: .kube-prometheus-stack.uds-prometheus-config
            targetPath: .
      # @lulaStart 4yw40198-a55e-4769-a5de-44ffe7636093
      - name: kube-prometheus-stack
        namespace: monitoring
        # @lulaEnd 4yw40198-a55e-4769-a5de-44ffe7636093
        url: https://prometheus-community.github.io/helm-charts
        version: 87.2.0
        valuesFiles:
          - "../values/kube-prometheus-stack-values.yaml"
        # kube-prometheus-stack is an upstream umbrella chart exposed broadly. Image references and
        # registries are excluded to prevent pulling unauthorized images, and security contexts to
        # prevent privilege escalation, across the operator and every bundled subcomponent.
        values:
          - sourcePath: .kube-prometheus-stack.kube-prometheus-stack
            targetPath: .
            excludePaths:
              - .kube-prometheus-stack.kube-prometheus-stack.global.imageRegistry
              - .kube-prometheus-stack.kube-prometheus-stack.alertmanager.alertmanagerSpec.image
              - .kube-prometheus-stack.kube-prometheus-stack.crds.upgradeJob.image
              - .kube-prometheus-stack.kube-prometheus-stack.kube-state-metrics.image
              - .kube-prometheus-stack.kube-prometheus-stack.prometheus.prometheusSpec.image
              - .kube-prometheus-stack.kube-prometheus-stack.prometheus-node-exporter.image
              - .kube-prometheus-stack.kube-prometheus-stack.prometheusOperator.image
              - .kube-prometheus-stack.kube-prometheus-stack.prometheusOperator.admissionWebhooks.deployment.image
              - .kube-prometheus-stack.kube-prometheus-stack.prometheusOperator.admissionWebhooks.patch.image
              - .kube-prometheus-stack.kube-prometheus-stack.prometheusOperator.prometheusConfigReloader.image
              - .kube-prometheus-stack.kube-prometheus-stack.prometheusOperator.thanosImage
              - .kube-prometheus-stack.kube-prometheus-stack.thanosRuler.thanosRulerSpec.image
              - .kube-prometheus-stack.kube-prometheus-stack.alertmanager.alertmanagerSpec.securityContext
              - .kube-prometheus-stack.kube-prometheus-stack.crds.upgradeJob.containerSecurityContext
              - .kube-prometheus-stack.kube-prometheus-stack.crds.upgradeJob.podSecurityContext
              - .kube-prometheus-stack.kube-prometheus-stack.kube-state-metrics.securityContext
              - .kube-prometheus-stack.kube-prometheus-stack.prometheus-node-exporter.containerSecurityContext
              - .kube-prometheus-stack.kube-prometheus-stack.prometheus.prometheusSpec.securityContext
              - .kube-prometheus-stack.kube-prometheus-stack.prometheusOperator.securityContext
              - .kube-prometheus-stack.kube-prometheus-stack.prometheusOperator.containerSecurityContext
              - .kube-prometheus-stack.kube-prometheus-stack.prometheusOperator.admissionWebhooks.createSecretJob.securityContext
              - .kube-prometheus-stack.kube-prometheus-stack.prometheusOperator.admissionWebhooks.deployment.securityContext
              - .kube-prometheus-stack.kube-prometheus-stack.prometheusOperator.admissionWebhooks.deployment.containerSecurityContext
              - .kube-prometheus-stack.kube-prometheus-stack.prometheusOperator.admissionWebhooks.patch.securityContext
              - .kube-prometheus-stack.kube-prometheus-stack.prometheusOperator.admissionWebhooks.patchWebhookJob.securityContext
              - .kube-prometheus-stack.kube-prometheus-stack.thanosRuler.thanosRulerSpec.securityContext
  - name: prometheus-blackbox-exporter
    required: false
    description: "UDS Core Prometheus Blackbox Exporter"
    charts:
      - name: prometheus-blackbox-exporter
        namespace: monitoring
        url: https://prometheus-community.github.io/helm-charts
        version: 11.13.0
        valuesFiles:
          - "../values/blackbox-exporter-values.yaml"
        # Upstream chart exposed broadly. Image references and registries are excluded to prevent
        # pulling unauthorized images, and security contexts to prevent privilege escalation.
        values:
          - sourcePath: .prometheus-blackbox-exporter.prometheus-blackbox-exporter
            targetPath: .
            excludePaths:
              - .prometheus-blackbox-exporter.prometheus-blackbox-exporter.global.imageRegistry
              - .prometheus-blackbox-exporter.prometheus-blackbox-exporter.image
              - .prometheus-blackbox-exporter.prometheus-blackbox-exporter.configReloader.image
              - .prometheus-blackbox-exporter.prometheus-blackbox-exporter.podSecurityContext
              - .prometheus-blackbox-exporter.prometheus-blackbox-exporter.securityContext
              - .prometheus-blackbox-exporter.prometheus-blackbox-exporter.configReloader.securityContext
