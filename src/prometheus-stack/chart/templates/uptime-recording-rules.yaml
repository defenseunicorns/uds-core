{{- if .Capabilities.APIVersions.Has "monitoring.coreos.com/v1" }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: uds-prometheus-stack-uptime
  namespace: {{ .Release.Namespace }}
spec:
  groups:
    - name: uds-shared-uptime-helpers
      rules:
        - record: kube_state_metrics:up
          expr: clamp_max(max(up{job=~".*kube-state-metrics.*"}), 1)

        - record: daemonset:desired_scheduled:changed_recently
          expr: |
            (
              kube_daemonset_status_desired_number_scheduled
              !=
              kube_daemonset_status_desired_number_scheduled offset 5m
            )

    - name: uds-monitoring-uptime
      rules:
        - record: uds:prometheus:up
          labels:
            uds_layer: monitoring
            uds_component: prometheus
          expr: |
            (
              clamp_max(kube_statefulset_status_replicas_available{statefulset="prometheus-kube-prometheus-stack-prometheus", namespace="monitoring"}, 1)
              or on()
              (absent(kube_statefulset_status_replicas_available{statefulset="prometheus-kube-prometheus-stack-prometheus", namespace="monitoring"}) * 0)
            )
            * on() group_left()
            kube_state_metrics:up

        - record: uds:alertmanager:up
          labels:
            uds_layer: monitoring
            uds_component: alertmanager
          expr: |
            (
              clamp_max(kube_statefulset_status_replicas_available{statefulset="alertmanager-kube-prometheus-stack-alertmanager", namespace="monitoring"}, 1)
              or on()
              (absent(kube_statefulset_status_replicas_available{statefulset="alertmanager-kube-prometheus-stack-alertmanager", namespace="monitoring"}) * 0)
            )
            * on() group_left()
            kube_state_metrics:up

        - record: uds:blackbox_exporter:up
          labels:
            uds_layer: monitoring
            uds_component: blackbox_exporter
          expr: |
            (
              clamp_max(kube_deployment_status_replicas_available{deployment="prometheus-blackbox-exporter", namespace="monitoring"}, 1)
              or on()
              (absent(kube_deployment_status_replicas_available{deployment="prometheus-blackbox-exporter", namespace="monitoring"}) * 0)
            )
            * on() group_left()
            kube_state_metrics:up

    - name: uds-access-uptime
      rules:
        - record: uds:access:up
          labels:
            uds_layer: core
            uds_component: core_access
          expr: uds:keycloak_endpoint:up
{{- end }}
