alertmanager:
  alertmanagerSpec:
    image:
      registry: cgr.dev
      repository: defenseunicorns.com/prometheus-alertmanager-fips
      tag: 0.32.1
kube-state-metrics:
  image:
    registry: cgr.dev
    repository: defenseunicorns.com/kube-state-metrics-fips
    tag: 2.18.0
  securityContext:
    enabled: true
    fsGroup: 65532
    runAsGroup: 65532
    runAsNonRoot: true
    runAsUser: 65532
prometheus:
  prometheusSpec:
    image:
      registry: cgr.dev
      repository: defenseunicorns.com/prometheus-fips
      tag: 3.11.3
prometheus-node-exporter:
  image:
    registry: cgr.dev
    repository: defenseunicorns.com/prometheus-node-exporter-fips
    tag: 1.11.1
    distroless: false
prometheusOperator:
  admissionWebhooks:
    containerSecurityContext:
      capabilities:
        drop:
          - ALL
    patch:
      enabled: true
      image:
        registry: cgr.dev
        repository: defenseunicorns.com/kube-webhook-certgen-fips
        # Chainguard provides kube-webhook-certgen from their ingress-nginx package, which follows a different versioning scheme than upstream's ingress-nginx/kube-webhook-certgen
        tag: v1.15.5
      securityContext:
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
  image:
    registry: cgr.dev
    repository: defenseunicorns.com/prometheus-operator-fips
    tag: 0.91.0
  prometheusConfigReloader:
    image:
      registry: cgr.dev
      repository: defenseunicorns.com/prometheus-config-reloader-fips
      tag: 0.91.0
