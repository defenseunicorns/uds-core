alertmanager:
  alertmanagerSpec:
    image:
      registry: cgr.dev
      repository: defenseunicorns.com/prometheus-alertmanager-fips
      # NOTE: exact version 0.32.1 not available at cgr.dev/defenseunicorns.com; using 0.31.1
      tag: 0.31.1
kube-state-metrics:
  image:
    registry: cgr.dev
    repository: defenseunicorns.com/kube-state-metrics-fips
    tag: 2.18.0
  securityContext:
    enabled: true
    fsGroup: 65532
    runAsGroup: 65532
    runAsNonRoot: true
    runAsUser: 65532
prometheus:
  prometheusSpec:
    image:
      registry: cgr.dev
      repository: defenseunicorns.com/prometheus-fips
      tag: 3.11.3
prometheus-node-exporter:
  image:
    registry: cgr.dev
    repository: defenseunicorns.com/prometheus-node-exporter-fips
    tag: 1.11.1
prometheusOperator:
  admissionWebhooks:
    containerSecurityContext:
      capabilities:
        drop:
          - ALL
    patch:
      enabled: true
      image:
        registry: cgr.dev
        repository: defenseunicorns.com/kube-webhook-certgen-fips
        # NOTE: exact version 1.6.9 not available at cgr.dev/defenseunicorns.com; using 1.15.2 (major jump)
        # NOTE: upstream ingress-nginx/kube-webhook-certgen is deprecated; successor jkroepke/kube-webhook-certgen not yet in Chainguard
        tag: 1.15.2
      securityContext:
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
  image:
    registry: cgr.dev
    repository: defenseunicorns.com/prometheus-operator-fips
    tag: 0.90.1
  prometheusConfigReloader:
    image:
      registry: cgr.dev
      repository: defenseunicorns.com/prometheus-config-reloader-fips
      tag: 0.90.1
