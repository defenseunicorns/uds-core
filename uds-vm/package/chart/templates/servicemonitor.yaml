apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kubevirt-metrics
  namespace: {{ .Release.Namespace }}
spec:
  endpoints:
  - path: /metrics
    port: metrics
    scheme: https
    tlsConfig:
      ca:
        secret:
          key: tls.crt
          name: kubevirt-ca
      insecureSkipVerify: true
  selector:
    matchLabels:
      prometheus.kubevirt.io: "true"
