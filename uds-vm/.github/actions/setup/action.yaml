name: "Setup Environment"
description: "UDS VM Environment Setup"
inputs:
  installK3d:
    description: "Whether to install k3d"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Install UDS CLI
      uses: defenseunicorns/setup-uds@ab842abcad1f7a3305c2538e3dd1950d0daacfa5 # v1.0.1
      with:
        # renovate: datasource=github-tags depName=defenseunicorns/uds-cli versioning=semver
        version: v0.33.0

    - name: Use Node.js latest
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24

    - name: Install k3d
      if: ${{ inputs.installK3d == 'true' }}
      shell: bash
      # renovate: datasource=github-tags depName=k3d-io/k3d versioning=semver
      run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG=v5.9.0 bash
