apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: cirros-pvc-vm
  namespace: podinfo-vm
  labels:
    app.kubernetes.io/name: cirros-pvc-vm
spec:
  runStrategy: Halted
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "true"
        traffic.sidecar.istio.io/kubevirtInterfaces: k6t-eth0
      labels:
        app.kubernetes.io/name: cirros-pvc-vm
        kubevirt.io/domain: cirros-pvc-vm
    spec:
      domain:
        devices:
          interfaces:
            - name: default
              masquerade: {}
              ports:
                - name: ssh
                  port: 22
          disks:
            - disk:
                bus: virtio
              name: rootdisk
        resources:
          requests:
            memory: 256M
      networks:
        - name: default
          pod: {}
      terminationGracePeriodSeconds: 0
      volumes:
        - name: rootdisk
          persistentVolumeClaim:
            claimName: cirros-import
