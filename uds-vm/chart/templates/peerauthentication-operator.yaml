apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: virt-operator-peerauth
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      kubevirt.io: virt-operator
  mtls:
    mode: STRICT
  portLevelMtls:
    8444:
      mode: PERMISSIVE
